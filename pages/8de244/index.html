    <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'执行测试用例'</span><span class="token punctuation">)</span>
    time<span class="token punctuation">.</span>sleep<span class="token punctuation">(</span><span class="token number">1</span>）
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h3 id="_1-实现"><a href="#_1-实现" class="header-anchor">#</a> 1. 实现</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># 自动化测试场景</span>
<span class="token keyword">import</span> time
<span class="token keyword">def</span> <span class="token function">foo</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'执行测试用例'</span><span class="token punctuation">)</span>
    time<span class="token punctuation">.</span>sleep<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span>
    
<span class="token keyword">def</span> <span class="token function">show_time</span><span class="token punctuation">(</span>func<span class="token punctuation">)</span><span class="token punctuation">:</span>
	start_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 开始时间</span>
	func<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 函数调用</span>
	end_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 结束时间</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'服务器响应时间: '</span><span class="token punctuation">,</span>end_timestart_time<span class="token punctuation">)</span>

show_time<span class="token punctuation">(</span>foo<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><h3 id="_2-使用-装饰器方案改造"><a href="#_2-使用-装饰器方案改造" class="header-anchor">#</a> 2. 使用 - 装饰器方案改造</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">import</span> time
<span class="token keyword">def</span> <span class="token function">show_time</span><span class="token punctuation">(</span>func<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">def</span> <span class="token function">inner</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
        start_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 开始时间</span>
        func<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 函数调用</span>
        end_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 结束时间</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'服务器响应时间: '</span><span class="token punctuation">,</span>end_timestart_time<span class="token punctuation">)</span>
        <span class="token keyword">return</span> inner <span class="token comment"># 返回函数对象</span>
    
<span class="token keyword">def</span> <span class="token function">foo</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'执行测试用例'</span><span class="token punctuation">)</span>
	time<span class="token punctuation">.</span>sleep<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span>
    
foo<span class="token operator">=</span>show_time<span class="token punctuation">(</span>foo<span class="token punctuation">)</span>
foo<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><ul><li>foo=show_time(foo) foo()</li> <li>但是每次执行一次都得重新赋值一次，麻烦，不够优雅</li> <li>python针对这个情况，提供一个完美的解决方案：<code>语法糖 @</code></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># 自动化测试场景</span>
<span class="token keyword">import</span> time

<span class="token keyword">def</span> <span class="token function">show_time</span><span class="token punctuation">(</span>func<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">def</span> <span class="token function">inner</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
        start_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 开始时间</span>
        func<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 函数调用</span>
        end_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 结束时间</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'服务器响应时间: '</span><span class="token punctuation">,</span>end_timestart_time<span class="token punctuation">)</span>
        <span class="token keyword">return</span> inner <span class="token comment"># 返回函数对象</span>
    
<span class="token decorator annotation punctuation">@show_time</span> <span class="token comment"># 语法糖 等价 foo=show_time(foo)</span>
<span class="token keyword">def</span> <span class="token function">foo</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'执行测试用例'</span><span class="token punctuation">)</span>
	time<span class="token punctuation">.</span>sleep<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span>
    
foo<span class="token punctuation">(</span><span class="token punctuation">)</span>

执行测试用例

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br></div></div><h3 id="_3-带参数的函数装饰器"><a href="#_3-带参数的函数装饰器" class="header-anchor">#</a> 3. 带参数的函数装饰器</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># 自动化测试场景</span>
<span class="token keyword">import</span> time

<span class="token keyword">def</span> <span class="token function">some_body_run</span><span class="token punctuation">(</span>name<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">def</span> <span class="token function">show_time</span><span class="token punctuation">(</span>func<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">def</span> <span class="token function">inner</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
            start_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 开始时间</span>
            func<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token comment">#函数调用</span>
            end_time <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token comment"># 结束时间</span>
            <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'服务器响应时间:'</span><span class="token punctuation">,</span>end_time<span class="token operator">-</span>start_time<span class="token punctuation">)</span>
            <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'执行者：'</span><span class="token punctuation">,</span>name<span class="token punctuation">)</span>
        <span class="token keyword">return</span> inner <span class="token comment"># 返回函数对象</span>
    <span class="token keyword">return</span> show_time
                  
<span class="token decorator annotation punctuation">@some_body_run</span><span class="token punctuation">(</span><span class="token string">'tom'</span><span class="token punctuation">)</span> <span class="token comment"># 语法糖 等价 foo=some_body_run('tom')</span>
<span class="token keyword">def</span> <span class="token function">foo</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'执行测试用例'</span><span class="token punctuation">)</span>
	time<span class="token punctuation">.</span>sleep<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br></div></div><h2 id="二、-log-技术"><a href="#二、-log-技术" class="header-anchor">#</a> 二、 log 技术</h2> <h3 id="_1-日志级别"><a href="#_1-日志级别" class="header-anchor">#</a> 1. 日志级别</h3> <p>Fatal -&gt; Error -&gt; Warning -&gt; Info -&gt; Debug</p> <table><thead><tr><th>级别</th> <th>描述</th></tr></thead> <tbody><tr><td><code>DEBUG</code></td> <td>细节信息，仅当诊断问题时适用。</td></tr> <tr><td><code>INFO</code></td> <td>确认程序按预期运行</td></tr> <tr><td><code>WARNING</code></td> <td>表明有已经或即将发生的意外（例如：磁盘空间不足）。程序仍按预期进行</td></tr> <tr><td><code>ERROR</code></td> <td>由于严重的问题，程序的某些功能已经不能正常执行</td></tr> <tr><td><code>CRITICAL</code></td> <td>严重的错误，表明程序已不能继续执行</td></tr></tbody></table> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">def</span> <span class="token function">logger</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token triple-quoted-string string">'''
    logging.basicConfig函数各参数：
    filename：指定日志文件名；
    filemode：和file函数意义相同，指定日志文件的打开模式，'w'或者'a'；
    format：指定输出的格式和内容，format可以输出很多有用的信息，
    level logging.INFO,
    '''</span>
    <span class="token comment"># 调用配置函数</span>
    logging<span class="token punctuation">.</span>basicConfig<span class="token punctuation">(</span><span class="token builtin">format</span><span class="token operator">=</span><span class="token string">'%(asctime)s - %(filename)s[line:%(lineno)d] - %(levelname)s:%(message)s'</span><span class="token punctuation">,</span>
                        filename<span class="token operator">=</span><span class="token string-interpolation"><span class="token string">f'../logs/</span><span class="token interpolation"><span class="token punctuation">{</span>datetime<span class="token punctuation">.</span>datetime<span class="token punctuation">.</span>now<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">.</span>strftime<span class="token punctuation">(</span><span class="token string">&quot;%Y_%m_%d %H-%M-%S&quot;</span><span class="token punctuation">)</span><span class="token punctuation">}</span></span><span class="token string">.log'</span></span><span class="token punctuation">,</span>
                        level<span class="token operator">=</span>logging<span class="token punctuation">.</span>INFO<span class="token punctuation">,</span>
                        filemode<span class="token operator">=</span><span class="token string">'a'</span>
                        <span class="token punctuation">)</span>
    <span class="token keyword">return</span> logging
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><ul><li><code>logging.basicConfig</code> : 函数各参数</li> <li><code>filename</code> ： 指定日志文件名</li> <li><code>level</code> ： 监控级别</li> <li><code>filemode</code> ： 和 file 函数意义相同，指定日志文件的打开模式， “w” 或者 “a”</li> <li><code>format</code> ： 指定输出的格式和内容，format 可以输出很多有用的信息</li></ul> <table><thead><tr><th>参数</th> <th>作用</th></tr></thead> <tbody><tr><td>%(levelno)s</td> <td>打印日志级别的数值</td></tr> <tr><td>%(levelname)s</td> <td>打印日志级别的名称</td></tr> <tr><td>%(pathname)s</td> <td>打印当前执行程序的路径，其实就 是sys.argv[0]</td></tr> <tr><td>%(filename)s</td> <td>打印当前执行程序名</td></tr> <tr><td>%(funcName)s</td> <td>打印日志的当前函数</td></tr> <tr><td>%(lineno)d</td> <td>打印日志的当前行号</td></tr> <tr><td>%(asctime)s</td> <td>打印日志的时间</td></tr> <tr><td>%(thread)d</td> <td>打印线程ID</td></tr> <tr><td>% (threadName)s</td> <td>打印线程名称</td></tr> <tr><td>%(process)d</td> <td>打印进程ID</td></tr></tbody></table> <p>代码调用：</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">from</span> tools<span class="token punctuation">.</span>logBasic <span class="token keyword">import</span> logger

log <span class="token operator">=</span> logger<span class="token punctuation">(</span><span class="token punctuation">)</span>  <span class="token comment"># 调用自定义封装的log函数</span>

<span class="token keyword">class</span> <span class="token class-name">TestLogin</span><span class="token punctuation">:</span>
    <span class="token comment"># [({},{}),({},{})]</span>
    <span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>mark<span class="token punctuation">.</span>parametrize</span><span class="token punctuation">(</span><span class="token string">'inData,respData'</span><span class="token punctuation">,</span> get_yaml_data<span class="token punctuation">(</span><span class="token string">'../data/data.yaml'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
    <span class="token keyword">def</span> <span class="token function">test_login</span><span class="token punctuation">(</span>self<span class="token punctuation">,</span> inData<span class="token punctuation">,</span> respData<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token comment"># 1- 调用--封装模块</span>
        res <span class="token operator">=</span> Login<span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">.</span>login<span class="token punctuation">(</span>inData<span class="token punctuation">,</span> getToken<span class="token operator">=</span><span class="token boolean">False</span><span class="token punctuation">)</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span>res<span class="token punctuation">)</span>
        log<span class="token punctuation">.</span>info<span class="token punctuation">(</span><span class="token string">'------##############------------'</span><span class="token punctuation">)</span>
        <span class="token comment"># 2- 断言  实际结果与预期的结果进行比较</span>
        <span class="token keyword">try</span><span class="token punctuation">:</span>
            <span class="token keyword">assert</span> res<span class="token punctuation">[</span><span class="token string">'msg'</span><span class="token punctuation">]</span> <span class="token operator">==</span> respData<span class="token punctuation">[</span><span class="token string">'msg'</span><span class="token punctuation">]</span>
        <span class="token keyword">except</span> Exception <span class="token keyword">as</span> err<span class="token punctuation">:</span>
            log<span class="token punctuation">.</span>error<span class="token punctuation">(</span>err<span class="token punctuation">)</span>  
            <span class="token keyword">raise</span> err  <span class="token comment"># 抛出异常</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br></div></div></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Pupper0601/NodesCode.git/edit/master/docs/50.软件测试/30.接口测试/02.接口自动化/10.装饰器及log技术.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%8E%A5%E5%8F%A3%E8%87%AA%E5%8A%A8%E5%8C%96%E6%B5%8B%E8%AF%95" title="标签">#接口自动化测试</a><a href="/tags/?tag=log%E6%8A%80%E6%9C%AF" title="标签">#log技术</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/07/26, 11:40:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/e3173a/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Mock技术</div></a> <a
