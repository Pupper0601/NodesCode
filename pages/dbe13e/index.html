    <span class="token punctuation">}</span>

<ol><li>定时器里面的 this 指向 window</li></ol></li> <li>方法中的 this ，谁调用就 指向 谁</li> <li></li></ol></div> <h2 id="四、-js执行机制"><a href="#四、-js执行机制" class="header-anchor">#</a> 四、 JS执行机制</h2> <h3 id="_1-同步-和-异步"><a href="#_1-同步-和-异步" class="header-anchor">#</a> 1. 同步 和 异步</h3> <blockquote><p>同步 ： 程序的执行顺序与任务的排列顺序一致，前一个任务结束后才会执行下一个任务；</p> <p>异步 ： 在执行一个任务的同时执行另一个任务</p></blockquote> <p>同步任务：</p> <ul><li>同步任务都在主线程上执行，形成一个 执行栈</li></ul> <p>异步任务：</p> <ul><li>JS 的异步 是通过 回调函数实现的</li> <li>包含：普通事件（click、resize等）、资源加载（load、error等）、定时器（setInterval、setTimeout等）</li></ul> <h3 id="_2-js-执行-机制"><a href="#_2-js-执行-机制" class="header-anchor">#</a> 2. JS 执行 机制</h3> <p><strong>事件循环</strong> ：</p> <ul><li>当主线程的同步任务执行完成后，会不断的去获取异步任务再到主线程执行</li></ul> <h2 id="五、-location-对象"><a href="#五、-location-对象" class="header-anchor">#</a> 五、 <code>location</code> 对象</h2> <blockquote><p><code>location</code> ： 用于获取 或 设置 窗体的 URL，并解析 URL</p></blockquote> <h3 id="_1-url"><a href="#_1-url" class="header-anchor">#</a> 1. URL</h3> <p>URL 的一般语法格式：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code>protocol://host[:port]/path/[?query]#fragment

http://www.itcast.cn/index.html?name=andy&amp;age=18#link
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><table><thead><tr><th>组成</th> <th>说明</th></tr></thead> <tbody><tr><td>protocol</td> <td>通讯协议（http、https）</td></tr> <tr><td>host</td> <td>主机域名（www.pupper.cn）</td></tr> <tr><td>port</td> <td>端口号（可选，http 的默认端口为 80）</td></tr> <tr><td>path</td> <td>路由（由 0 到 多个 &quot;/&quot; 隔开的字符串，一般为主机文件地址）</td></tr> <tr><td>query</td> <td>参数 （以键值对的形式，通过 &quot;&amp;&quot; 符号分割开来</td></tr> <tr><td>fragment</td> <td>片段 &quot;#&quot; 后面的内容，常见于连接锚点</td></tr></tbody></table> <h3 id="_2-location-对象属性"><a href="#_2-location-对象属性" class="header-anchor">#</a> 2. <code>location</code> 对象属性</h3> <table><thead><tr><th>对象属性</th> <th>返回值</th></tr></thead> <tbody><tr><td>location.href</td> <td>获取 或者 设置 整个 URL</td></tr> <tr><td>location.host</td> <td>返回 注意域名（www.pupper.cn）</td></tr> <tr><td>location.port</td> <td>返回 端口号 （如果未写，则返回 空字符串）</td></tr> <tr><td>location.pathname</td> <td>返回 路径</td></tr> <tr><td>location.search</td> <td>返回 参数</td></tr> <tr><td>location.hash</td> <td>返回 片段 （ # 后面的内容，常见于连接 锚点）</td></tr></tbody></table> <h3 id="案例-页面自动跳转"><a href="#案例-页面自动跳转" class="header-anchor">#</a> 案例 --- 页面自动跳转</h3> <div class="language-HTML line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">class</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>demo<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>button</span> <span class="token attr-name">type</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>button<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>点击<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>button</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span> <span class="token attr-name">type</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>text/javascript<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span><span class="token script"><span class="token language-javascript">
    <span class="token keyword">var</span> but <span class="token operator">=</span> document<span class="token punctuation">.</span><span class="token function">querySelector</span><span class="token punctuation">(</span><span class="token string">'button'</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
