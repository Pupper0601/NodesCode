</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="_4-gitlab-验证"><a href="#_4-gitlab-验证" class="header-anchor">#</a> 4.  gitlab 验证</h3> <p>网页打开：<code>服务器ip:9001</code></p> <blockquote><p>默认用户名为：<code>root</code></p> <p>初始登录需要修改密码，8位以上</p></blockquote> <p><img src="https://pupper.com.cn/img/20220725164059" alt="20220725164059"></p> <h3 id="_5-报-502-错误解决办法"><a href="#_5-报-502-错误解决办法" class="header-anchor">#</a> 5. 报 502 错误解决办法</h3> <h4 id="_1-进入容器-重启服务"><a href="#_1-进入容器-重启服务" class="header-anchor">#</a> 1. 进入容器 重启服务</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> <span class="token builtin class-name">exec</span> -it 容器名或id /bin/bash

gitlab-ctl reconfigure
gitlab-ctl restart
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h4 id="_2-端口占用-修改端口"><a href="#_2-端口占用-修改端口" class="header-anchor">#</a> 2. 端口占用 --- 修改端口</h4> <p>使用工具打开文件 <code>hostconfig.json</code>，修改 大括号内的 端口号（宿主机端口）</p> <p>文件目录：<code>/var/lib/docker/containers/容器id</code></p> <div class="language-json line-numbers-mode"><pre class="language-json"><code><span class="token property">&quot;PortBindings&quot;</span><span class="token operator">:</span><span class="token punctuation">{</span><span class="token property">&quot;22/tcp&quot;</span><span class="token operator">:</span><span class="token punctuation">[</span><span class="token punctuation">{</span><span class="token property">&quot;HostIp&quot;</span><span class="token operator">:</span><span class="token string">&quot;&quot;</span><span class="token punctuation">,</span><span class="token property">&quot;HostPort&quot;</span><span class="token operator">:</span><span class="token string">&quot;8022&quot;</span><span class="token punctuation">}</span><span class="token punctuation">]</span><span class="token punctuation">,</span><span class="token property">&quot;443/tcp&quot;</span><span class="token operator">:</span><span class="token punctuation">[</span><span class="token punctuation">{</span><span class="token property">&quot;HostIp&quot;</span><span class="token operator">:</span><span class="token string">&quot;&quot;</span><span class="token punctuation">,</span><span class="token property">&quot;HostPort&quot;</span><span class="token operator">:</span><span class="token string">&quot;443&quot;</span><span class="token punctuation">}</span><span class="token punctuation">]</span><span class="token punctuation">,</span><span class="token property">&quot;80/tcp&quot;</span><span class="token operator">:</span><span class="token punctuation">[</span><span class="token punctuation">{</span><span class="token property">&quot;HostIp&quot;</span><span class="token operator">:</span><span class="token string">&quot;&quot;</span><span class="token punctuation">,</span><span class="token property">&quot;HostPort&quot;</span><span class="token operator">:</span><span class="token string">&quot;9002&quot;</span><span class="token punctuation">}</span><span class="token punctuation">]</span><span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725164137" alt="20220725164137"></p> <h4 id="_3-内存占用过多"><a href="#_3-内存占用过多" class="header-anchor">#</a> 3. 内存占用过多</h4> <h2 id="三、-git客户端安装"><a href="#三、-git客户端安装" class="header-anchor">#</a> 三、 git客户端安装</h2> <h3 id="_1-下载-客户端"><a href="#_1-下载-客户端" class="header-anchor">#</a> 1. 下载 客户端</h3> <p><a href="https://git-scm.com/downloads" target="_blank" rel="noopener noreferrer">git官网地址<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> https://git-scm.com/downloads</p> <p><strong>点击 downloads 中的 windows 下载</strong></p> <p><img src="https://pupper.com.cn/img/20220725164204" alt="20220725164204"></p> <h3 id="_2-安装-git-客户端"><a href="#_2-安装-git-客户端" class="header-anchor">#</a> 2. 安装 git 客户端</h3> <p>无脑安装</p> <p><img src="https://pupper.com.cn/img/20220725164237" alt="20220725164237"></p> <h3 id="_3-git-可视化工具-gitkraken"><a href="#_3-git-可视化工具-gitkraken" class="header-anchor">#</a> 3. git 可视化工具 --- GitKraken</h3> <p><a href="https://www.gitkraken.com/" target="_blank" rel="noopener noreferrer">GitKraken 下载地址<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> ： https://www.gitkraken.com/</p> <p><a href="https://github.com/k-skye/gitkraken-chinese" target="_blank" rel="noopener noreferrer">GitKraken 汉化地址<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> ： https://github.com/k-skye/gitkraken-chinese</p> <p><img src="https://pupper.com.cn/img/20220725164325" alt="20220725164325"></p> <h3 id="_4-本地仓库创建"><a href="#_4-本地仓库创建" class="header-anchor">#</a> 4. 本地仓库创建</h3> <ol><li><p>新建文件夹</p></li> <li><p>查看 git 版本</p> <ol><li><p>在文件夹上 右键 --- git bash Here</p> <p><img src="https://pupper.com.cn/img/20220725164400" alt="20220725164400"></p></li></ol> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">git</span> --version

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ol> <h2 id="四、git-分支操作"><a href="#四、git-分支操作" class="header-anchor">#</a> 四、git 分支操作</h2> <h3 id="_1-查看分支"><a href="#_1-查看分支" class="header-anchor">#</a> 1. 查看分支</h3> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">git</span> brach -a    <span class="token comment"># 查看远程分支</span>
