</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220726095823.png" alt=""></p> <h3 id="_3-安装-pymysqlclient-模块"><a href="#_3-安装-pymysqlclient-模块" class="header-anchor">#</a> 3. 安装 pymysqlclient 模块</h3> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token comment"># 链接 mysql 数据库需要此模块,此模块安装不了的，参考附录的方法</span>

pip <span class="token function">install</span> mysqlclient 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p><img src="https://pupper.com.cn/img/20220726095846.png" alt=""></p> <h3 id="_4-配置-数据库参数"><a href="#_4-配置-数据库参数" class="header-anchor">#</a> 4. 配置 数据库参数</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code>DATABASES <span class="token operator">=</span> <span class="token punctuation">{</span>
    <span class="token string">'default'</span><span class="token punctuation">:</span> <span class="token punctuation">{</span>
        <span class="token string">'ENGINE'</span><span class="token punctuation">:</span> <span class="token string">'django.db.backends.mysql'</span><span class="token punctuation">,</span>
        <span class="token string">'NAME'</span><span class="token punctuation">:</span> <span class="token string">'course_autotp'</span><span class="token punctuation">,</span>    <span class="token comment"># 数据库名称</span>
        <span class="token string">'USER'</span><span class="token punctuation">:</span> <span class="token string">'root'</span><span class="token punctuation">,</span>     <span class="token comment"># 用户名</span>
        <span class="token string">'PASSWORD'</span><span class="token punctuation">:</span> <span class="token string">'xxxx'</span><span class="token punctuation">,</span>   <span class="token comment"># 密码</span>
        <span class="token string">'HOST'</span><span class="token punctuation">:</span> <span class="token string">'158.247.205.137'</span><span class="token punctuation">,</span>
        <span class="token string">'PORT'</span><span class="token punctuation">:</span> <span class="token string">'3306'</span><span class="token punctuation">,</span>
        <span class="token string">'TEST'</span><span class="token punctuation">:</span> <span class="token punctuation">{</span>
            <span class="token string">'CHARSET'</span><span class="token punctuation">:</span> <span class="token string">'utf8'</span><span class="token punctuation">,</span>      <span class="token comment"># 数据库的编码配置</span>
            <span class="token string">'COLLATION'</span><span class="token punctuation">:</span> <span class="token string">'utf8_general_ci'</span><span class="token punctuation">,</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><p><img src="https://pupper.com.cn/img/20220726095904.png" alt=""></p> <h2 id="二、-数据库设计"><a href="#二、-数据库设计" class="header-anchor">#</a> 二、 数据库设计</h2> <p><img src="https://pupper.com.cn/img/20220726095926.png" alt=""></p> <h3 id="_1-一对一-关系"><a href="#_1-一对一-关系" class="header-anchor">#</a> 1. 一对一 关系</h3> <p>1对1就是1个模型关联另一个模型，他们之间的关系是1对1</p> <p>一对一关联与多对一关联非常类似。若在模型中定义了 <a href="https://docs.djangoproject.com/zh-hans/3.2/ref/models/fields/#django.db.models.OneToOneField" target="_blank" rel="noopener noreferrer">OneToOneField<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> ，该模型的实例只需通过其属
性就能访问关联对象</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">class</span> <span class="token class-name">EntryDetail</span><span class="token punctuation">(</span>models<span class="token punctuation">.</span>Model<span class="token punctuation">)</span><span class="token punctuation">:</span>
	entry <span class="token operator">=</span> models<span class="token punctuation">.</span>OneToOneField<span class="token punctuation">(</span>Entry<span class="token punctuation">,</span> on_delete<span class="token operator">=</span>models<span class="token punctuation">.</span>CASCADE<span class="token punctuation">)</span>
	details <span class="token operator">=</span> models<span class="token punctuation">.</span>TextField<span class="token punctuation">(</span><span class="token punctuation">)</span>
	
ed <span class="token operator">=</span> EntryDetail<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token builtin">id</span><span class="token operator">=</span><span class="token number">2</span><span class="token punctuation">)</span>
ed<span class="token punctuation">.</span>entry <span class="token comment"># Returns the related Entry object.</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>不同点在于 “反向” 查询。一对一关联所关联的对象也能访问 Manager 对象，但这个 Manager 仅代表
一个对象，而不是对象的集合(QuerySet):</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>e <span class="token operator">=</span> Entry<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token builtin">id</span><span class="token operator">=</span><span class="token number">2</span><span class="token punctuation">)</span>
e<span class="token punctuation">.</span>entrydetail <span class="token comment"># returns the related EntryDetail object</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>若未为关联关系指定对象，Django 会抛出 DoesNotExist 异常。</p> <p>实例能通过为正向关联指定关联对象一样的方式指定给反向关联:</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>e<span class="token punctuation">.</span>entrydetail <span class="token operator">=</span> ed
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="_2-模型代码设计"><a href="#_2-模型代码设计" class="header-anchor">#</a> 2. 模型代码设计</h3> <p>其中，request，step和config参考HR对应部分的字段，由于其中会出现很多嵌套字段，所以1层的字段

="line-number">51</span><br><span class="line-number">52</span><br><span class="line-number">53</span><br><span class="line-number">54</span><br><span class="line-number">55</span><br><span class="line-number">56</span><br><span class="line-number">57</span><br><span class="line-number">58</span><br><span class="line-number">59</span><br><span class="line-number">60</span><br><span class="line-number">61</span><br><span class="line-number">62</span><br><span class="line-number">63</span><br></div></div><h3 id="_3-同步数据库"><a href="#_3-同步数据库" class="header-anchor">#</a> 3. 同步数据库</h3> <p>生成 数据库 同步 文件</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>python manage.py makemigrations
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220726100001.png" alt=""></p> <p>同步数据库</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>python manage.py migrate
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220726100025.png" alt=""></p> <h2 id="三、-反向查询概念解析"><a href="#三、-反向查询概念解析" class="header-anchor">#</a> 三、 反向查询概念解析</h2> <h3 id="_1-正向查询"><a href="#_1-正向查询" class="header-anchor">#</a> 1. 正向查询</h3> <p>模型查询其关联的项目叫做正向查询（外键定义在模型）</p> <p>例如：步骤查询其所在的用例</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># test.py</span>

<span class="token keyword">class</span> <span class="token class-name">TestRelatedQuery</span><span class="token punctuation">(</span>TestCase<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">def</span> <span class="token function">setUp</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span> <span class="token operator">-</span><span class="token operator">&gt;</span> <span class="token boolean">None</span><span class="token punctuation">:</span>
        <span class="token comment"># 创建套件和用例</span>
        self<span class="token punctuation">.</span>config <span class="token operator">=</span> Config<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>create<span class="token punctuation">(</span>name<span class="token operator">=</span><span class="token string">'用例1'</span><span class="token punctuation">)</span>
