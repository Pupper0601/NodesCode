dio&gt;</code> ：音频标签， 尽可能使用 mp3 格式的文件</p> <p><code>&lt;video&gt;</code> ： 视频标签，尽可能使用 mp4 格式的文件</p></blockquote> <h4 id="_1-视频标签-video"><a href="#_1-视频标签-video" class="header-anchor">#</a> 1. 视频标签（video）</h4> <table><thead><tr><th>标签</th> <th>描述</th></tr></thead> <tbody><tr><td>video</td> <td>定义一个视频</td></tr> <tr><td>source</td> <td>定义多种媒体资源</td></tr> <tr><td>track</td> <td>定义在媒体播放器文本轨迹</td></tr></tbody></table> <div class="language-css line-numbers-mode"><pre class="language-css"><code><span class="token comment">/* 解决兼容性问题 */</span>
&lt;video width=<span class="token string">&quot;320&quot;</span> height=<span class="token string">&quot;240&quot;</span> controls&gt;
  &lt;source src=<span class="token string">&quot;movie.mp4&quot;</span> type=<span class="token string">&quot;video/mp4&quot;</span>&gt;
  &lt;source src=<span class="token string">&quot;movie.ogg&quot;</span> type=<span class="token string">&quot;video/ogg&quot;</span>&gt;

&lt;/video&gt;
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>常见属性：</p> <table><thead><tr><th>属性</th> <th>值</th> <th>说明</th></tr></thead> <tbody><tr><td>autoplay</td> <td>autoplay</td> <td>视频就绪自动播放（google需要添加 muted 来解决）</td></tr> <tr><td>controls</td> <td>controls</td> <td>向用户显示播放控件</td></tr> <tr><td>width</td> <td>px</td> <td>播放器宽度</td></tr> <tr><td>height</td> <td>px</td> <td>播放器高度</td></tr> <tr><td>loop</td> <td>loop</td> <td>是否循环播放</td></tr> <tr><td>preload</td> <td>auto（预加载）、none（不预加载）</td> <td>是否预加载（如果有 autoplay 可忽略）</td></tr> <tr><td>src</td> <td>url</td> <td>视频地址</td></tr> <tr><td>poster</td> <td>imgurl</td> <td>加载等待图片</td></tr> <tr><td>muted</td> <td>muted</td> <td>静音播放</td></tr></tbody></table> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token doctype"><span class="token punctuation">&lt;!</span><span class="token doctype-tag">DOCTYPE</span> <span class="token name">html</span><span class="token punctuation">&gt;</span></span>
