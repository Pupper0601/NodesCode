T4b6Q2+KejgAAAABJRU5ErkJggg==">环境初始化<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="一、-fixture"><a href="#一、-fixture" class="header-anchor">#</a> 一、 fixture</h2> <h3 id="_1-fixture-详解"><a href="#_1-fixture-详解" class="header-anchor">#</a> 1. fixture 详解</h3> <p><code>fixture（scope='function'，params=None，autouse=False，ids=None，name=None）</code></p> <ul><li><code>scope</code>：有四个级别参数&quot;function&quot;（默认），&quot;class&quot;，&quot;module&quot;，&quot;session&quot;</li> <li><code>params</code>：一个可选的参数列表，它将导致多个参数调用fixture功能和所有测试使用它。</li> <li><code>autouse</code>：如果True，则为所有测试激活fixture func可以看到它。如果为False则显示需要参考来激活fixture</li> <li><code>ids</code>：每个字符串id的列表，每个字符串对应于params这样他们就是测试ID的一部分。如果没有提供ID它们将从params自动生成</li> <li><code>name</code>：fixture的名称。这默认为装饰函数的名称。如果fixture在定义它的统一模块中使用，夹具的功能名称将被请求夹具的功能arg遮蔽，解决这个问题的一种方法时将装饰函数命</li></ul> <h3 id="_2-fixture-作用范围"><a href="#_2-fixture-作用范围" class="header-anchor">#</a> 2. fixture 作用范围</h3> <p><code>scope</code> 参数可以控制fixture的作用范围：</p> <p><strong>session   &gt;   module   &gt;   class   &gt;   function</strong></p> <ul><li><code>function</code>：每一个函数或方法都会调用</li> <li><code>class</code>：每一个类调用一次，一个类中可以有多个方法</li> <li><code>module</code>：每一个.py文件调用一次，该文件内又有多个 function  和 class</li> <li><code>session</code>：是多个文件调用一次，可以跨 .py 文件调用，每个 .py 文件就是 module</li></ul> <h3 id="_3-调用-fixture-的三种方法"><a href="#_3-调用-fixture-的三种方法" class="header-anchor">#</a> 3. 调用 fixture 的三种方法</h3> <h4 id="_1-函数或类里面方法直接传-fixture-的函数参数名称"><a href="#_1-函数或类里面方法直接传-fixture-的函数参数名称" class="header-anchor">#</a> 1. 函数或类里面方法直接传 fixture 的函数参数名称</h4> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>fixture</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">def</span> <span class="token function">test1</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'\n开始执行function'</span><span class="token punctuation">)</span>
    
<span class="token keyword">def</span> <span class="token function">test_a</span><span class="token punctuation">(</span>test1<span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'---用例a执行---'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h4 id="_2-使用-装饰器-pytest-mark-usefixtures-修饰-需要运行的用例"><a href="#_2-使用-装饰器-pytest-mark-usefixtures-修饰-需要运行的用例" class="header-anchor">#</a> 2. 使用 装饰器 @pytest.mark.usefixtures() 修饰 需要运行的用例</h4> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">import</span> pytest

<span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>fixture</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">def</span> <span class="token function">test1</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'\n开始执行function'</span><span class="token punctuation">)</span>
	
<span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>mark<span class="token punctuation">.</span>usefixtures</span><span class="token punctuation">(</span><span class="token string">'test1'</span><span class="token punctuation">)</span>
<span class="token keyword">def</span> <span class="token function">test_a</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'---用例a执行---'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h4 id="_3-叠加-usefixtures"><a href="#_3-叠加-usefixtures" class="header-anchor">#</a> 3. 叠加 usefixtures</h4> <p>如果一个方法或者一个 class用例想要勇士调用多个 fixture</p> <p>可以使用 <code>@pytest.mark.usefixture()</code> 进行叠加</p> <p>注意叠加顺序：<strong>先执行的放底层，后执行的放上层</strong></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>fixture</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">def</span> <span class="token function">test1</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'\n开始执行function1'</span><span class="token punctuation">)</span>
    
<span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>fixture</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">def</span> <span class="token function">test2</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
	<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'\n开始执行function2'</span><span class="token punctuation">)</span>

值</p> <p>fixture 需要用到 return 出来的参数时，只能将参数名称直接当参数传入，</p> <p>不需要用到return出来的参数时，两种方式都可以。</p> <p>**autouse设置为True，自动调用fixture功能  **</p> <h2 id="二、fixture-的使用"><a href="#二、fixture-的使用" class="header-anchor">#</a> 二、fixture 的使用</h2> <p>创建 <code>conftest.py</code> 文件，所有初始化内容写在里边。</p> <h3 id="_1-直接使用"><a href="#_1-直接使用" class="header-anchor">#</a> 1. 直接使用</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token decorator annotation punctuation">@pytest<span class="token punctuation">.</span>fixture</span><span class="token punctuation">(</span>scope<span class="token operator">=</span><span class="token string">'session'</span><span class="token punctuation">,</span> autouse<span class="token operator">=</span><span class="token boolean">True</span><span class="token punctuation">)</span>  <span class="token comment"># 整一个包都会执行，</span>
<span class="token keyword">def</span> <span class="token function">start_demo</span><span class="token punctuation">(</span>request<span class="token punctuation">)</span><span class="token punctuation">:</span>  <span class="token comment"># 这个一个运行该包下，任何一个test文件，都会一开始就执行的操作</span>

    <span class="token comment"># 数据清除操作:删除测试生成的垃圾数据</span>
    <span class="token keyword">def</span> <span class="token function">fin</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'---自动化测试---结束'</span><span class="token punctuation">)</span>

    request<span class="token punctuation">.</span>addfinalizer<span class="token punctuation">(</span>fin<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h3 id="_2-手动调用-无-return-传参"><a href="#_2-手动调用-无-return-传参" class="header-anchor">#</a> 2. 手动调用 --- 无 return 传参</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># conftest.py</span>
