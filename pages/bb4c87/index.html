<span class="token keyword">def</span> <span class="token function">portScan</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> startPort<span class="token punctuation">,</span> endPort<span class="token punctuation">)</span><span class="token punctuation">:</span>

            sk <span class="token operator">=</span> socket<span class="token punctuation">.</span>socket<span class="token punctuation">(</span>socket<span class="token punctuation">.</span>AF_INET<span class="token punctuation">,</span> socket<span class="token punctuation">.</span>SOCK_STREAM<span class="token punctuation">)</span>
            <span class="token comment"># 限制连接时间 0.5s</span>
            sk<span class="token punctuation">.</span>settimeout<span class="token punctuation">(</span><span class="token number">0.5</span><span class="token punctuation">)</span>
            conn <span class="token operator">=</span> sk<span class="token punctuation">.</span>connect_ex<span class="token punctuation">(</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> i<span class="token punctuation">)</span><span class="token punctuation">)</span>
            <span class="token keyword">if</span> conn <span class="token operator">==</span> <span class="token number">0</span><span class="token punctuation">:</span>
                <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string-interpolation"><span class="token string">f'主机：</span><span class="token interpolation"><span class="token punctuation">{</span>address<span class="token punctuation">}</span></span><span class="token string">，端口：</span><span class="token interpolation"><span class="token punctuation">{</span>i<span class="token punctuation">}</span></span><span class="token string"> 已开放。'</span></span><span class="token punctuation">)</span>
            sk<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
    <span class="token keyword">except</span> Exception<span class="token punctuation">:</span>
        <span class="token keyword">pass</span>

<span class="token comment"># 域名解析</span>
<span class="token keyword">def</span> <span class="token function">analysisDomainName</span><span class="token punctuation">(</span>domain_name<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token triple-quoted-string string">&quot;&quot;&quot;
    对 域名 进行解析

    &quot;&quot;&quot;</span>

    <span class="token keyword">else</span><span class="token punctuation">:</span>
        domainName <span class="token operator">=</span> domain_name
    serverIp <span class="token operator">=</span> socket<span class="token punctuation">.</span>gethostbyname<span class="token punctuation">(</span>domainName<span class="token punctuation">)</span>
    <span class="token keyword">return</span> serverIp


<span class="token comment"># 端口检查</span>
<span class="token keyword">def</span> <span class="token function">checkPort</span><span class="token punctuation">(</span>startPort<span class="token punctuation">,</span> endPort<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token triple-quoted-string string">&quot;&quot;&quot;

    :param startPort: 开始值

        <span class="token keyword">if</span> <span class="token number">0</span> <span class="token operator">&lt;=</span> startPort <span class="token operator">&lt;=</span> <span class="token number">65535</span> <span class="token keyword">and</span> <span class="token number">0</span> <span class="token operator">&lt;=</span> endPort <span class="token operator">&lt;=</span> <span class="token number">65535</span><span class="token punctuation">:</span>

<span class="token comment"># 端口扫描</span>
<span class="token keyword">def</span> <span class="token function">portScan</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> port<span class="token punctuation">,</span> postList<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token triple-quoted-string string">&quot;&quot;&quot;
    扫描函数---线程扫描
    :param postList: 空列表
    :param port: 端口（int）
    :param address: 域名或IP（str）
    :return: 返回已经开启的端口
    &quot;&quot;&quot;</span>
    <span class="token keyword">try</span><span class="token punctuation">:</span>
        <span class="token comment"># 实现 TCP 连接</span>
        sk <span class="token operator">=</span> socket<span class="token punctuation">.</span>socket<span class="token punctuation">(</span>socket<span class="token punctuation">.</span>AF_INET<span class="token punctuation">,</span> socket<span class="token punctuation">.</span>SOCK_STREAM<span class="token punctuation">)</span>
        <span class="token comment"># 限制连接时间 0.5s</span>
        sk<span class="token punctuation">.</span>settimeout<span class="token punctuation">(</span><span class="token number">0.5</span><span class="token punctuation">)</span>
        conn <span class="token operator">=</span> sk<span class="token punctuation">.</span>connect_ex<span class="token punctuation">(</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> port<span class="token punctuation">)</span><span class="token punctuation">)</span>
        <span class="token keyword">if</span> conn <span class="token operator">==</span> <span class="token number">0</span><span class="token punctuation">:</span>
            <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string-interpolation"><span class="token string">f'主机：</span><span class="token interpolation"><span class="token punctuation">{</span>address<span class="token punctuation">}</span></span><span class="token string">，端口：</span><span class="token interpolation"><span class="token punctuation">{</span>port<span class="token punctuation">}</span></span><span class="token string"> 已开放。'</span></span><span class="token punctuation">)</span>
            writeDate<span class="token punctuation">(</span><span class="token string-interpolation"><span class="token string">f&quot;</span><span class="token interpolation"><span class="token punctuation">{</span>port<span class="token punctuation">}</span></span><span class="token string">&quot;</span></span><span class="token punctuation">)</span>
            postList<span class="token punctuation">.</span>append<span class="token punctuation">(</span>port<span class="token punctuation">)</span>       <span class="token comment"># 将开放的端口添加到列表</span>
        sk<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
    <span class="token keyword">except</span><span class="token punctuation">:</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;扫描异常。&quot;</span><span class="token punctuation">)</span>


<span class="token comment"># 协程封装</span>
<span class="token keyword">def</span> <span class="token function">geventScan</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> startPort<span class="token punctuation">,</span> endPort<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token triple-quoted-string string">&quot;&quot;&quot;
    协程函数封装
    :param address:ip地址
    :param startPort: 端口开始值
    :param endPort: 端口结束值
    :return:
    &quot;&quot;&quot;</span>
    returnList <span class="token operator">=</span> <span class="token punctuation">[</span><span class="token punctuation">]</span>

    g <span class="token operator">=</span> gevent<span class="token punctuation">.</span>pool<span class="token punctuation">.</span>Pool<span class="token punctuation">(</span><span class="token number">500</span><span class="token punctuation">)</span>   <span class="token comment"># 协程池</span>

    <span class="token keyword">for</span> one <span class="token keyword">in</span> <span class="token builtin">range</span><span class="token punctuation">(</span>startPort<span class="token punctuation">,</span> endPort <span class="token operator">+</span> <span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">:</span>

        <span class="token comment"># 阻塞</span>
    gevent<span class="token punctuation">.</span>joinall<span class="token punctuation">(</span>geventList<span class="token punctuation">)</span>


<span class="token comment"># 进程封装</span>
<span class="token keyword">def</span> <span class="token function">processScan</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> startPort<span class="token operator">=</span><span class="token number">0</span><span class="token punctuation">,</span> endPort<span class="token operator">=</span><span class="token number">65535</span><span class="token punctuation">)</span><span class="token punctuation">:</span>
    writeDate<span class="token punctuation">(</span>address<span class="token punctuation">)</span>
    st <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span>
    processList <span class="token operator">=</span> <span class="token punctuation">[</span><span class="token punctuation">]</span>
    cpuCount <span class="token operator">=</span> cpu_count<span class="token punctuation">(</span><span class="token punctuation">)</span>  <span class="token comment"># 获取CPU核数</span>
    ports <span class="token operator">=</span> <span class="token punctuation">[</span><span class="token punctuation">]</span>
    <span class="token keyword">if</span> endPort <span class="token operator">//</span> cpuCount <span class="token operator">&gt;=</span> <span class="token number">1</span><span class="token punctuation">:</span>
        <span class="token keyword">for</span> i <span class="token keyword">in</span> <span class="token builtin">range</span><span class="token punctuation">(</span>cpuCount<span class="token punctuation">)</span><span class="token punctuation">:</span>
            <span class="token keyword">if</span> i <span class="token operator">!=</span> cpuCount <span class="token operator">-</span> <span class="token number">1</span><span class="token punctuation">:</span>
                num <span class="token operator">=</span> endPort <span class="token operator">//</span> cpuCount
                newPort <span class="token operator">=</span> <span class="token punctuation">(</span>startPort<span class="token punctuation">,</span> startPort <span class="token operator">+</span> num<span class="token punctuation">)</span>

                startPort <span class="token operator">+=</span> num

                ports<span class="token punctuation">.</span>append<span class="token punctuation">(</span><span class="token punctuation">(</span>endPort <span class="token operator">//</span> cpuCount <span class="token operator">*</span> <span class="token punctuation">(</span>cpuCount <span class="token operator">-</span> <span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">,</span> endPort<span class="token punctuation">)</span><span class="token punctuation">)</span>
    <span class="token keyword">else</span><span class="token punctuation">:</span>
        ports<span class="token punctuation">.</span>append<span class="token punctuation">(</span><span class="token punctuation">(</span>startPort<span class="token punctuation">,</span> endPort<span class="token punctuation">)</span><span class="token punctuation">)</span>

    <span class="token keyword">for</span> i <span class="token keyword">in</span> ports<span class="token punctuation">:</span>
        p <span class="token operator">=</span> Process<span class="token punctuation">(</span>target<span class="token operator">=</span>geventScan<span class="token punctuation">,</span> args<span class="token operator">=</span><span class="token punctuation">(</span>address<span class="token punctuation">,</span> i<span class="token punctuation">[</span><span class="token number">0</span><span class="token punctuation">]</span><span class="token punctuation">,</span> i<span class="token punctuation">[</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
        p<span class="token punctuation">.</span>start<span class="token punctuation">(</span><span class="token punctuation">)</span>
        processList<span class="token punctuation">.</span>append<span class="token punctuation">(</span>p<span class="token punctuation">)</span>

    <span class="token keyword">for</span> i <span class="token keyword">in</span> processList<span class="token punctuation">:</span>
        i<span class="token punctuation">.</span>join<span class="token punctuation">(</span><span class="token punctuation">)</span>
    et <span class="token operator">=</span> time<span class="token punctuation">.</span>time<span class="token punctuation">(</span><span class="token punctuation">)</span>
    <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string-interpolation"><span class="token string">f'扫描过程，总计耗时：</span><span class="token interpolation"><span class="token punctuation">{</span><span class="token punctuation">(</span>et <span class="token operator">-</span> st<span class="token punctuation">)</span><span class="token punctuation">:</span><span class="token format-spec">.2f</span><span class="token punctuation">}</span></span><span class="token string"> s。'</span></span><span class="token punctuation">)</span>
    writeDate<span class="token punctuation">(</span><span class="token string-interpolation"><span class="token string">f&quot;</span><span class="token interpolation"><span class="token punctuation">{</span><span class="token punctuation">(</span>et <span class="token operator">-</span> st<span class="token punctuation">)</span><span class="token punctuation">:</span><span class="token format-spec">.2f</span><span class="token punctuation">}</span></span><span class="token string">&quot;</span></span><span class="token punctuation">)</span>


<span class="token comment"># 写入临时文件</span>

<span class="token comment"># 文件写入</span>

<span class="token keyword">if</span> __name__ <span class="token operator">==</span> <span class="token string">'__main__'</span><span class="token punctuation">:</span>
