BJRU5ErkJggg==">Scoket网络编程技术<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="一、网络编程技术概述"><a href="#一、网络编程技术概述" class="header-anchor">#</a> 一、网络编程技术概述</h2> <h3 id="_1-软件开发架构"><a href="#_1-软件开发架构" class="header-anchor">#</a> 1.软件开发架构</h3> <ul><li><p><strong>应用类 -- C/S架构</strong></p> <p><code>C/S</code> ：客户端与服务器端架构，客户端 泛指 <strong>应用程序EXE</strong> ，程序需要先安装才能运行，对系统环境依赖较大。</p></li> <li><p><strong>Web类 -- B/S 架构</strong></p> <p><code>B/S</code> ：浏览器端与服务器端架构，用户通过 <strong>HTTP</strong> 请求服务器端相关的资源。</p></li></ul> <h3 id="_2-网络通信要素"><a href="#_2-网络通信要素" class="header-anchor">#</a> 2.网络通信要素</h3> <ul><li><strong>IP地址</strong> ：互联网协议地址</li> <li><strong>端口</strong> ：设备与外界通讯交流的出口</li> <li><strong>传输协议</strong></li></ul> <div class="custom-block tip"><p class="custom-block-title">提示</p> <p><strong>IP 地址</strong> 精确到 <strong>具体的一台电脑</strong>，而 <strong>端口</strong> 精确到 <strong>具体的程序</strong></p></div> <h3 id="_3-通信协议"><a href="#_3-通信协议" class="header-anchor">#</a> 3.通信协议</h3> <p>通信协议：互联网的核心就是由一堆协议组成，协议就是标准。</p> <p><strong>七层网络协议模型</strong></p> <p><img src="https://pupper.com.cn/img/20220725182835.png" alt=""></p> <h2 id="二、socket-通信流程"><a href="#二、socket-通信流程" class="header-anchor">#</a> 二、Socket 通信流程</h2> <h3 id="_1-socket-概念"><a href="#_1-socket-概念" class="header-anchor">#</a> 1.Socket 概念</h3> <p><code>Socket</code> ：是应用层与 TCP/IP 协议族通信的中间软件抽象层，它是一组接口。</p> <p>​	在设计模式中，<strong>Sorcket</strong> 其实就是一个门面模式，它把复杂的 <strong>TPC/IP</strong> 协议族隐藏在 <strong>Socket</strong> 接口后面，对用户来说，一组简单的接口就是全部，让 <strong>Socket</strong> 去组织数据，以符合指定的协议。</p> <div class="custom-block tip"><p class="custom-block-title">提示</p> <p>1.<code>websocket</code> （应用层） ：通过 <strong>HTTP</strong> 协议进行传输，</p> <p>2.<code>socket</code> （传输层） ：通过 <strong>TCP</strong> 协议进行传输</p></div> <h3 id="_2-socket实现方式-tcp-协议与-udp-协议"><a href="#_2-socket实现方式-tcp-协议与-udp-协议" class="header-anchor">#</a> 2.Socket实现方式：TCP 协议与 UDP 协议</h3> <ul><li><p><code>TCP</code> 协议 ：可靠的、面向连接的协议（eg：打电话）、传输效率低全双工通信（发送缓存&amp;接收缓存）、面向字节流。</p> <p><strong>主要用途</strong>：Web浏览器、电子邮件、文件传输程序</p></li> <li><p><code>UDP</code> 协议 ： 不可靠的、无连接的服务，传输效率高，一对一、多对多、一对多、多对一、面向报文，尽最大的努力服务，无拥塞控制。</p> <p><strong>主要用途</strong>：域名系统、视频流、IP 语音。</p></li> <li><p><code>TCP</code> 和 <code>UDP</code> 都是 <strong>传输层</strong> 的。</p></li></ul> <p><strong>TCP</strong> 协议流程图：</p> <p><img src="https://pupper.com.cn/img/20220725182911.png" alt=""></p> <h3 id="_3-socket-通信流程"><a href="#_3-socket-通信流程" class="header-anchor">#</a> 3. Socket 通信流程</h3> <ol><li><p>服务器根据地址类型、Socket 类型、协议 <strong>创建 Scoket</strong> ；</p></li> <li><p>服务器为 socket <strong>绑定IP地址和端口号</strong> ；</p></li> <li><p>服务器 <strong>socket 监听端口号请求</strong> ，随时准备 接收客户端发送来的连接，这个时候服务器端的 Socket 并没有打开；</p></li> <li><p><strong>客户端创建 Socket</strong> ；</p></li> <li><p><strong>客户端打开 socket</strong> ，根据服务器 <strong>IP 地址</strong>和 <strong>端口号</strong> 试图<strong>连接服务器 socket</strong> ；</p></li> <li><p>服务器 Scoket 接收到客户端的 socket 请求，被动打开，<strong>开始接收客户端请求</strong>，直到客户端返回连接信息。这个时候 socket 进入阻塞状态。</p> <p><code>阻塞状态</code>：即 <code>accept（）</code> 方法一直等到客户端返回连接信息后才返回，开始接收下一个客户端连接请求。</p></li> <li><p>**客户端连接成功，**<strong>向服务器发送连接状态信息</strong>。</p></li> <li><p><strong>服务器 accept 方法返回</strong>，连接成功；</p></li> <li><p><strong>客户端向 socket 写入信息</strong>（或服务端向 socket 写入信息）；</p></li> <li><p><strong>服务器读取信息</strong>（客户端读取信息）；</p></li> <li><p>客户端关闭；</p></li> <li><p>服务器关闭。</p></li></ol> <p><img src="https://pupper.com.cn/img/20220725182954.png" alt=""></p> <h2 id="socket-常用方法"><a href="#socket-常用方法" class="header-anchor">#</a> Socket 常用方法</h2> <h3 id="_1-python-的-socket-编程"><a href="#_1-python-的-socket-编程" class="header-anchor">#</a> 1.Python 的 Socket 编程</h3> <ul><li><strong>低级别的网络服务</strong> 支持基本的 <code>Socket</code> ，它提供了标准的 BSD Socket API ，可以访问底层操作系统 Socket 接口的全部方法。</li> <li>**高级别的网络服务 **模块 <code>SocketServer</code> ， 它提供了服务器中心类，可以简化网络服务器的开发。</li></ul> <h3 id="_2-什么是-socket-编程"><a href="#_2-什么是-socket-编程" class="header-anchor">#</a> 2.什么是 Socket 编程</h3> <p><code>socket</code> ：又称 ”套接字“ ，应用程序通常通过 ”套接字“ 向网络发出请求或者应答网络请求，使主机间或者一台计算机上的进程间可以通讯。</p> <p>使用 <strong><code>socket（）</code></strong> 函数来 <strong>创建 套接字</strong></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>socket<span class="token punctuation">.</span>socket<span class="token punctuation">(</span><span class="token punctuation">[</span>family<span class="token punctuation">[</span><span class="token punctuation">,</span><span class="token builtin">type</span><span class="token punctuation">[</span><span class="token punctuation">,</span>proto<span class="token punctuation">]</span><span class="token punctuation">]</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ul><li><code>family</code> ：套接字家族可以使 <strong>AF_UNIX</strong> 或者 <strong>AF_INET</strong> .</li> <li><code>type</code> ：套接字类型可以根据是面向 <strong>连接</strong> 的还是 <strong>非连接</strong> 分为 <strong>SOCK_STREAM</strong> 或 <strong>SOCK_DGRAM</strong> .</li> <li><code>protocol</code> ：一般不填默认为 <strong>0</strong> 。</li></ul> <h3 id="_3-socket-服务端"><a href="#_3-socket-服务端" class="header-anchor">#</a> 3. Socket 服务端</h3> <ul><li>使用 <strong>socket 模块</strong> 的 <strong>socket 函数</strong> 来创建一个 <code>socket 对象</code>。socket 对象可以通过调用其他函数来设置一个 socket服务。</li> <li>可以通过调用 <code>bind（hostname，port）</code>函数来指定服务的 port （端口）。</li> <li>调用 <strong>socket 对象</strong> 的 <code>accept 方法</code>。该方法等待客户端的连接，并返回 <strong>connection 对象</strong>，表示已连接到客户端。</li></ul> <h3 id="_4-socket-客户端"><a href="#_4-socket-客户端" class="header-anchor">#</a> 4. Socket 客户端</h3> <ul><li><strong><code>socket.connect(hosname, port)</code></strong> 方法 打开一个 TCP 连接到主机为 hostname 端口为 port 的服务商。</li> <li>连接后就可以从服务端获取数据，记住，操作完成 后需要 <strong>关闭连接</strong></li></ul> <h3 id="_5-案例一-单个连接"><a href="#_5-案例一-单个连接" class="header-anchor">#</a> 5.案例一（单个连接）</h3> <p><strong>服务端：</strong></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">import</span> socket

ip_port <span class="token operator">=</span> <span class="token punctuation">(</span><span class="token string">'127.0.0.1'</span><span class="token punctuation">,</span> <span class="token number">9999</span><span class="token punctuation">)</span>

<span class="token comment"># 1.创建 socket 对象</span>
sk <span class="token operator">=</span> socket<span class="token punctuation">.</span>socket<span class="token punctuation">(</span><span class="token punctuation">)</span>

<span class="token comment"># 2.绑定 ip port</span>
sk<span class="token punctuation">.</span>bind<span class="token punctuation">(</span>ip_port<span class="token punctuation">)</span>

<span class="token comment"># 3.开启监听</span>
sk<span class="token punctuation">.</span>listen<span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;---服务已经启动---&quot;</span><span class="token punctuation">)</span>

<span class="token comment"># 4.阻塞 等待连接  返回：socket连接对象（套接字）和 客户端IP</span>
conn<span class="token punctuation">,</span> addr <span class="token operator">=</span> sk<span class="token punctuation">.</span>accept<span class="token punctuation">(</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;客户端的地址 &gt;&gt;&gt; :&quot;</span><span class="token punctuation">,</span> addr<span class="token punctuation">)</span>

<span class="token comment"># 5.接收数据---客户端数据</span>
<span class="token comment"># recv() 需要文件宽度作为参数，一般为 1024</span>
<span class="token comment"># 使用 decode() 进行解码</span>
receive_data <span class="token operator">=</span> conn<span class="token punctuation">.</span>recv<span class="token punctuation">(</span><span class="token number">1024</span><span class="token punctuation">)</span><span class="token punctuation">.</span>decode<span class="token punctuation">(</span><span class="token string">&quot;utf-8&quot;</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;接收客户端的数据 &gt;&gt;&gt; ：&quot;</span><span class="token punctuation">,</span> receive_data<span class="token punctuation">)</span>

<span class="token comment"># 6.发送数据</span>
send_data <span class="token operator">=</span> <span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">&quot;请输入 &gt;&gt;&gt; :&quot;</span><span class="token punctuation">)</span>
<span class="token comment"># sendall() 要求是 byte 类型，使用encode() 进行字符转换</span>
conn<span class="token punctuation">.</span>sendall<span class="token punctuation">(</span>send_data<span class="token punctuation">.</span>encode<span class="token punctuation">(</span><span class="token string">&quot;utf-8&quot;</span><span class="token punctuation">)</span><span class="token punctuation">)</span>

<span class="token comment"># 7.关闭 socket</span>
conn<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br></div></div><p>客户端：</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">import</span> socket

<span class="token comment"># 1.创建 socket</span>
sk <span class="token operator">=</span> socket<span class="token punctuation">.</span>socket<span class="token punctuation">(</span><span class="token punctuation">)</span>

<span class="token comment"># 2.连接到服务器</span>
sk<span class="token punctuation">.</span>connect<span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token string">'127.0.0.1'</span><span class="token punctuation">,</span> <span class="token number">9999</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;服务端连接成功&quot;</span><span class="token punctuation">)</span>

<span class="token comment"># 3.发送数据</span>
send_data <span class="token operator">=</span> <span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">&quot;请输入 &gt;&gt;&gt; :&quot;</span><span class="token punctuation">)</span>
<span class="token comment"># sendall() 要求是 byte 类型，使用encode() 进行转码</span>
sk<span class="token punctuation">.</span>sendall<span class="token punctuation">(</span>send_data<span class="token punctuation">.</span>encode<span class="token punctuation">(</span><span class="token string">'utf-8'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>

<span class="token comment"># 4.接收服务端数据</span>
server_data <span class="token operator">=</span> sk<span class="token punctuation">.</span>recv<span class="token punctuation">(</span><span class="token number">1024</span><span class="token punctuation">)</span><span class="token punctuation">.</span>decode<span class="token punctuation">(</span><span class="token string">&quot;utf-8&quot;</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;接收服务端的数据 &gt;&gt;&gt; ：&quot;</span><span class="token punctuation">,</span> server_data<span class="token punctuation">)</span>

<span class="token comment"># 5.关闭 socket</span>
sk<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br></div></div><h3 id="案例二-多个连接"><a href="#案例二-多个连接" class="header-anchor">#</a> 案例二（多个连接）：</h3> <p>服务端：</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">import</span> socketserver

<span class="token comment"># 1.需要继承一个类</span>
<span class="token keyword">class</span> <span class="token class-name">sqServer</span><span class="token punctuation">(</span>socketserver<span class="token punctuation">.</span>BaseRequestHandler<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">def</span> <span class="token function">handle</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;聊天服务器上线了&quot;</span><span class="token punctuation">)</span>
        <span class="token keyword">while</span> <span class="token boolean">True</span><span class="token punctuation">:</span>
            <span class="token keyword">try</span><span class="token punctuation">:</span>
                <span class="token comment"># 接收客户端数据</span>
                self<span class="token punctuation">.</span>client_data <span class="token operator">=</span> self<span class="token punctuation">.</span>request<span class="token punctuation">.</span>recv<span class="token punctuation">(</span><span class="token number">1024</span><span class="token punctuation">)</span>
                <span class="token keyword">print</span><span class="token punctuation">(</span>self<span class="token punctuation">.</span>client_data<span class="token punctuation">.</span>decode<span class="token punctuation">(</span><span class="token string">&quot;utf-8&quot;</span><span class="token punctuation">)</span><span class="token punctuation">)</span>

                <span class="token comment"># 发送数据</span>
                send_data <span class="token operator">=</span> <span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">&quot;请输入 &gt;&gt;&gt; :&quot;</span><span class="token punctuation">)</span>
                self<span class="token punctuation">.</span>request<span class="token punctuation">.</span>sendall<span class="token punctuation">(</span>send_data<span class="token punctuation">.</span>encode<span class="token punctuation">(</span><span class="token string">&quot;utf-8&quot;</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
            <span class="token keyword">except</span> ConnectionResetError <span class="token keyword">as</span> e<span class="token punctuation">:</span>
                <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;一个客户端关闭了连接&quot;</span><span class="token punctuation">)</span>
                <span class="token keyword">break</span>
        self<span class="token punctuation">.</span>request<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>

<span class="token comment"># 2.创建服务</span>
<span class="token comment"># ThreadingTCPServer 是使用多线程</span>
<span class="token comment"># ForkingTCPServer 是使用多进程处理并发</span>
server <span class="token operator">=</span> socketserver<span class="token punctuation">.</span>ThreadingTCPServer<span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token string">&quot;127.0.0.1&quot;</span><span class="token punctuation">,</span> <span class="token number">9998</span><span class="token punctuation">)</span><span class="token punctuation">,</span> sqServer<span class="token punctuation">)</span>

<span class="token comment"># 3.一直在线</span>
server<span class="token punctuation">.</span>serve_forever<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br></div></div><p>客户端：</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">import</span> socket

<span class="token comment"># 1.创建 socket</span>
sk <span class="token operator">=</span> socket<span class="token punctuation">.</span>socket<span class="token punctuation">(</span><span class="token punctuation">)</span>

<span class="token comment"># 2.连接到服务器</span>
sk<span class="token punctuation">.</span>connect<span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token string">'127.0.0.1'</span><span class="token punctuation">,</span> <span class="token number">9998</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;服务端连接成功&quot;</span><span class="token punctuation">)</span>

<span class="token comment"># 3.发送数据</span>
<span class="token keyword">while</span> <span class="token boolean">True</span><span class="token punctuation">:</span>
    send_data <span class="token operator">=</span> <span class="token string">&quot;老王：&quot;</span> <span class="token operator">+</span> <span class="token builtin">input</span><span class="token punctuation">(</span><span class="token string">&quot;请输入 &gt;&gt;&gt; :&quot;</span><span class="token punctuation">)</span>
    <span class="token keyword">if</span> send_data <span class="token operator">==</span> <span class="token string">'老王：'</span> <span class="token operator">+</span> <span class="token string">'exit'</span><span class="token punctuation">:</span>
        <span class="token keyword">break</span>
    <span class="token keyword">else</span><span class="token punctuation">:</span>
        <span class="token comment"># sendall() 要求是 byte 类型，使用encode() 进行转码</span>
        sk<span class="token punctuation">.</span>sendall<span class="token punctuation">(</span>send_data<span class="token punctuation">.</span>encode<span class="token punctuation">(</span><span class="token string">'utf-8'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>

        <span class="token comment"># 4.接收服务端数据</span>
        server_data <span class="token operator">=</span> sk<span class="token punctuation">.</span>recv<span class="token punctuation">(</span><span class="token number">1024</span><span class="token punctuation">)</span><span class="token punctuation">.</span>decode<span class="token punctuation">(</span><span class="token string">&quot;utf-8&quot;</span><span class="token punctuation">)</span>
        <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;接收服务端的数据 &gt;&gt;&gt; ：&quot;</span><span class="token punctuation">,</span> server_data<span class="token punctuation">)</span>

<span class="token comment"># 5.关闭 socket</span>
sk<span class="token punctuation">.</span>close<span class="token punctuation">(</span><span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br></div></div></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Pupper0601/NodesCode.git/edit/master/docs/50.软件测试/40.测试开发/02.测试工具开发/03.Scoket网络编程技术.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%B5%8B%E8%AF%95%E5%BC%80%E5%8F%91" title="标签">#测试开发</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/07/26, 11:40:48</span></di
