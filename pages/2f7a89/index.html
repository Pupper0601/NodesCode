sS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">测试平台实战-9（测试用例执行-1）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="一、-序列化器中的类属性字段"><a href="#一、-序列化器中的类属性字段" class="header-anchor">#</a> 一、 序列化器中的类属性字段</h2> <p>序列化 中所定义的 类属性 字段，一般情况下与 模型类 字段 相对应</p> <p>默认情况下，这些类属性字段既可以进行序列化输出，也可以进行反序列化输入</p> <p>不需要输入（反序列化）、输出（序列化）的字段，则不需要定义，定义的字段 则必须出现在 fields列表中</p> <p><strong>只需要反序列化输入</strong>，则定义 <code>write_only = True</code></p> <p><strong>只需要序列化输出</strong>，则定义 <code>read_only = True</code></p> <p>响应的参数如果是多个查询集，需要在 <code>JsonResponse()</code> 中传参 <code>many=True</code></p> <ul><li><code>label</code>：当前字段在前端的api页面中所显示的字段名称</li> <li><code>allow_null = False</code>：当前字段是否允许传None，默认是False（必填字段False，反之则True）</li> <li><code>allow_blank = False</code>：当前字段是否运行为空，默认是False（必填字段False，反之则True）</li> <li><code>required=False</code>：当前字段允许不传，默认是True（必填字段True，反之则False）</li></ul> <h2 id="二、反序列化-校验机制"><a href="#二、反序列化-校验机制" class="header-anchor">#</a> 二、反序列化_校验机制</h2> <p>调用序列化器对象的 <code>is_valid()</code> 方法，校验前端参数的正确性，不调用则不校验</p> <p>校验成功 返回<code>True</code>、校验失败 返回<code>False</code></p> <p><code>is_valid(raise_exception = True)</code>：校验失败后，则抛出异常</p> <p>当调用 <code>is_valid()</code> 之后，才能 调用 序列化器对象的 <code>errors</code> 属性，内容为校验的错误提示<code>（dict）</code></p> <p>在 <code>views.py</code> 中，如果传参进行了输入反序列化的话，那么需要调用的是经过校验后的数据，</p> <p>比如说 ：新增数据，应该是：xxx类.objects.create(**serializer.validated_data)</p> <p>在视图集（ViewSet）中，<code>REST</code> 都默认调用了 <code>is_valid()</code> 方法来校验入参。</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">class</span> <span class="token class-name">CaseSerializer</span><span class="token punctuation">(</span>serializers<span class="token punctuation">.</span>ModelSerializer<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token comment"># config 字段为 Config 序列化器 ， REST 会自动提取</span>
    config <span class="token operator">=</span> ConfigSerializer<span class="token punctuation">(</span><span class="token punctuation">)</span>
    <span class="token comment"># many=True 表示以列表形式展现, read_only=True 表示该字段只用在输出上, write_only=True 只用于输入</span>
    teststeps <span class="token operator">=</span> StepSerializer<span class="token punctuation">(</span>many<span class="token operator">=</span><span class="token boolean">True</span><span class="token punctuation">,</span> required<span class="token operator">=</span><span class="token boolean">False</span><span class="token punctuation">)</span>
    project_id <span class="token operator">=</span> serializers<span class="token punctuation">.</span>CharField<span class="token punctuation">(</span>write_only<span class="token operator">=</span><span class="token boolean">True</span><span class="token punctuation">)</span>
    <span class="token comment"># 格式化输出时间</span>
    create_time <span class="token operator">=</span> serializers<span class="token punctuation">.</span>DateTimeField<span class="token punctuation">(</span><span class="token builtin">format</span><span class="token operator">=</span><span class="token string">'%Y-%m-%d %H:%M:%S'</span><span class="token punctuation">,</span> read_only<span class="token operator">=</span><span class="token boolean">True</span><span class="token punctuation">)</span>
    update_time <span class="token operator">=</span> serializers<span class="token punctuation">.</span>DateTimeField<span class="token punctuation">(</span><span class="token builtin">format</span><span class="token operator">=</span><span class="token string">'%Y-%m-%d %H:%M:%S'</span><span class="token punctuation">,</span> read_only<span class="token operator">=</span><span class="token boolean">True</span><span class="token punctuation">)</span>

    <span class="token keyword">class</span> <span class="token class-name">Meta</span><span class="token punctuation">:</span>
        model <span class="token operator">=</span> Case
        fields <span class="token operator">=</span> <span class="token punctuation">[</span><span class="token string">'config'</span><span class="token punctuation">,</span> <span class="token string">'teststeps'</span><span class="token punctuation">,</span> <span class="token string">'decs'</span><span class="token punctuation">,</span> <span class="token string">'project_id'</span><span class="token punctuation">,</span> <span class="token string">'file_path'</span><span class="token punctuation">,</span> <span class="token string">'create_time'</span><span class="token punctuation">,</span> <span class="token string">'update_time'</span><span class="token punctuation">]</span>

    <span class="token keyword">def</span> <span class="token function">create</span><span class="token punctuation">(</span>self<span class="token punctuation">,</span> validated_data<span class="token punctuation">)</span><span class="token punctuation">:</span>  <span class="token comment"># 经过校验过后的参数 --- 字典形式</span>
        <span class="token comment"># 创建 Config---获取创建 config 的数据</span>
        config_kws <span class="token operator">=</span> validated_data<span class="token punctuation">.</span>pop<span class="token punctuation">(</span><span class="token string">'config'</span><span class="token punctuation">)</span>
        <span class="token comment"># 获取项目</span>
        project <span class="token operator">=</span> Project<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>get<span class="token punctuation">(</span>pk<span class="token operator">=</span>validated_data<span class="token punctuation">[</span><span class="token string">'project_id'</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
        config <span class="token operator">=</span> Config<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>create<span class="token punctuation">(</span>project<span class="token operator">=</span>project<span class="token punctuation">,</span> <span class="token operator">**</span>config_kws<span class="token punctuation">)</span>  <span class="token comment"># 注意关联 project</span>
        <span class="token comment"># 创建 case</span>
        <span class="token comment"># 用例文件名 = 项目名_用例名.json</span>
        file_path <span class="token operator">=</span> <span class="token string-interpolation"><span class="token string">f'</span><span class="token interpolation"><span class="token punctuation">{</span>project<span class="token punctuation">.</span>name<span class="token punctuation">}</span></span><span class="token string">_</span><span class="token interpolation"><span class="token punctuation">{</span>config<span class="token punctuation">.</span>name<span class="token punctuation">}</span></span><span class="token string">.json'</span></span>
        self<span class="token punctuation">.</span>instance <span class="token operator">=</span> Case<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>create<span class="token punctuation">(</span>config<span class="token operator">=</span>config<span class="token punctuation">,</span> file_path<span class="token operator">=</span>file_path<span class="token punctuation">)</span>
        <span class="token comment"># 返回当前实例对象 --- 模型对象</span>
        <span class="token keyword">return</span> self<span class="token punctuation">.</span>instance

    <span class="token keyword">def</span> <span class="token function">update</span><span class="token punctuation">(</span>self<span class="token punctuation">,</span> instance<span class="token punctuation">,</span> validated_data<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token comment"># 更新 config</span>
        config_kws <span class="token operator">=</span> validated_data<span class="token punctuation">.</span>pop<span class="token punctuation">(</span><span class="token string">'config'</span><span class="token punctuation">)</span>
        <span class="token comment"># 从入参拿到 project id</span>
        project <span class="token operator">=</span> Project<span class="token punctuation">.</span>objects<span class="token punctuation">.</span>get<span class="token punctuation">(</span>pk<span class="token operator">=</span>validated_data<span class="token punctuation">[</span><span class="token string">'project_id'</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
        <span class="token comment"># 调用序列化器来更新 config</span>
