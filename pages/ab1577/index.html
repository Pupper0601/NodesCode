</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h4 id="验证是否安装成功"><a href="#验证是否安装成功" class="header-anchor">#</a> 验证是否安装成功</h4> <div class="language-powershell line-numbers-mode"><pre class="language-powershell"><code>import locust
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="二、-关键字说明"><a href="#二、-关键字说明" class="header-anchor">#</a> 二、 关键字说明</h2> <h3 id="_1-wait-time-每个用户执行后的等待时间"><a href="#_1-wait-time-每个用户执行后的等待时间" class="header-anchor">#</a> 1. wait_time (每个用户执行后的等待时间）</h3> <p>如果没有指定 wait_time ，则下个任务将立即执行</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># 随机等待 1~5 秒</span>
wait_time <span class="token operator">=</span> between<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">,</span> <span class="token number">5</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><h3 id="_2-weight-和-fixed-count-属性"><a href="#_2-weight-和-fixed-count-属性" class="header-anchor">#</a> 2. weight 和 fixed_count 属性</h3> <p>多个用户类时，使用 <code>weight</code> 来确认 产生的用户比例</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">class</span> <span class="token class-name">WebUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
    weight <span class="token operator">=</span> <span class="token number">3</span>
    <span class="token punctuation">.</span><span class="token punctuation">.</span><span class="token punctuation">.</span>

<span class="token keyword">class</span> <span class="token class-name">MobileUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
    weight <span class="token operator">=</span> <span class="token number">1</span>
    <span class="token punctuation">.</span><span class="token punctuation">.</span><span class="token punctuation">.</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><p>使用 <code>fixed_count</code> 来确认用户类产生的个数，与总数无关</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">class</span> <span class="token class-name">AdminUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
    wait_time <span class="token operator">=</span> constant<span class="token punctuation">(</span><span class="token number">600</span><span class="token punctuation">)</span>
    fixed_count <span class="token operator">=</span> <span class="token number">1</span>

    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">restart_app</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token punctuation">.</span><span class="token punctuation">.</span><span class="token punctuation">.</span>

<span class="token keyword">class</span> <span class="token class-name">WebUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h3 id="_3-on-start-和-on-stop-方法"><a href="#_3-on-start-和-on-stop-方法" class="header-anchor">#</a> 3. on_start 和 on_stop 方法</h3> <p><strong>on_start</strong> : 开始运行前调用（相当于 前置）</p> <p><strong>on_stop</strong> ：结束运行时调用（相当于 后置）</p> <h3 id="_4-task-装饰器"><a href="#_4-task-装饰器" class="header-anchor">#</a> 4. @task 装饰器</h3> <ul><li>为用户添加任务的最简单方法</li> <li>接受一个可选的权重参数，可用于指定任务的执行率</li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">from</span> locust <span class="token keyword">import</span> User<span class="token punctuation">,</span> task<span class="token punctuation">,</span> between

<span class="token keyword">class</span> <span class="token class-name">MyUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
    wait_time <span class="token operator">=</span> between<span class="token punctuation">(</span><span class="token number">5</span><span class="token punctuation">,</span> <span class="token number">15</span><span class="token punctuation">)</span>

    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">task1</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">pass</span>

    <span class="token decorator annotation punctuation">@task</span><span class="token punctuation">(</span><span class="token number">2</span><span class="token punctuation">)</span>
    <span class="token keyword">def</span> <span class="token function">task2</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">pass</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><h3 id="_5-tasks-任务属性"><a href="#_5-tasks-任务属性" class="header-anchor">#</a> 5. tasks 任务属性</h3> <p><code>tasks</code> 可以是 列表 或 字典</p> <ul><li><p>列表： 元素为普通函数，执行时随机选择</p> <ul><li>例如：<code>tasks = [my_task, my_task1, my_task2]</code></li></ul></li> <li><p>字典： 可调用的对象作为键， 整数作为值，值为执行比率，执行时随机选择</p> <ul><li>例如： <code>{my_task: 3, another_task: 1}</code></li> <li>my_task 被执行的可能性是another_task的 3 倍。</li></ul></li></ul> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">from</span> locust <span class="token keyword">import</span> User<span class="token punctuation">,</span> constant

<span class="token keyword">def</span> <span class="token function">my_task</span><span class="token punctuation">(</span>user<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">pass</span>

<span class="token keyword">class</span> <span class="token class-name">MyUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
    tasks <span class="token operator">=</span> <span class="token punctuation">[</span>my_task<span class="token punctuation">]</span>
    wait_time <span class="token operator">=</span> constant<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br></div></div><h3 id="_6-tag-装饰器"><a href="#_6-tag-装饰器" class="header-anchor">#</a> 6. @tag 装饰器</h3> <p>使用 <a href="http://docs.locust.io/en/stable/api.html#locust.tag" target="_blank" rel="noopener noreferrer">@tag<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 装饰器标记任务</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">from</span> locust <span class="token keyword">import</span> User<span class="token punctuation">,</span> constant<span class="token punctuation">,</span> task<span class="token punctuation">,</span> tag

<span class="token keyword">class</span> <span class="token class-name">MyUser</span><span class="token punctuation">(</span>User<span class="token punctuation">)</span><span class="token punctuation">:</span>
    wait_time <span class="token operator">=</span> constant<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span>

    <span class="token decorator annotation punctuation">@tag</span><span class="token punctuation">(</span><span class="token string">'tag1'</span><span class="token punctuation">)</span>
    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">task1</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">pass</span>

    <span class="token decorator annotation punctuation">@tag</span><span class="token punctuation">(</span><span class="token string">'tag1'</span><span class="token punctuation">,</span> <span class="token string">'tag2'</span><span class="token punctuation">)</span>
    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">task2</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">pass</span>

    <span class="token decorator annotation punctuation">@tag</span><span class="token punctuation">(</span><span class="token string">'tag3'</span><span class="token punctuation">)</span>
    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">task3</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">pass</span>

    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">task4</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token keyword">pass</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br></div></div><ul><li><p>--tags :  需要执行的任务</p> <ul><li><code>--tags tag2 tag3</code></li> <li>执行  标记为 tag2 和 tag3 的认为</li></ul></li> <li><p>--exclude-tags ： 除这些之外的任务</p> <ul><li><code>--exclude-tags tag3</code></li> <li>执行 标记 tag3 之外的所有任务</li></ul></li></ul> <h3 id="_7-test-start-和-test-stop"><a href="#_7-test-start-和-test-stop" class="header-anchor">#</a> 7. test_start 和 test_stop</h3> <p>用于在开始 和 结束 测试时执行。</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">from</span> locust <span class="token keyword">import</span> events

<span class="token decorator annotation punctuation">@events<span class="token punctuation">.</span>test_start<span class="token punctuation">.</span>add_listener</span>
<span class="token keyword">def</span> <span class="token function">on_test_start</span><span class="token punctuation">(</span>environment<span class="token punctuation">,</span> <span class="token operator">**</span>kwargs<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;A new test is starting&quot;</span><span class="token punctuation">)</span>

<span class="token decorator annotation punctuation">@events<span class="token punctuation">.</span>test_stop<span class="token punctuation">.</span>add_listener</span>
<span class="token keyword">def</span> <span class="token function">on_test_stop</span><span class="token punctuation">(</span>environment<span class="token punctuation">,</span> <span class="token operator">**</span>kwargs<span class="token punctuation">)</span><span class="token punctuation">:</span>
    <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;A new test is ending&quot;</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h3 id="_8-httpuser"><a href="#_8-httpuser" class="header-anchor">#</a> 8. HttpUser</h3> <ul><li><p>用来模拟用户</p></li> <li><p><code>self.client</code> ：接口请求</p></li></ul> <h2 id="三、-压力测试"><a href="#三、-压力测试" class="header-anchor">#</a> 三、 压力测试</h2> <h3 id="_1-文件编写"><a href="#_1-文件编写" class="header-anchor">#</a> 1. 文件编写</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token comment"># locustfile.py</span>

<span class="token keyword">import</span> random
<span class="token keyword">from</span> locust <span class="token keyword">import</span> HttpUser<span class="token punctuation">,</span> task<span class="token punctuation">,</span> between

<span class="token comment"># 定义 class 来模拟发送 Http 请求的用户</span>
<span class="token keyword">class</span> <span class="token class-name">QuickstartUser</span><span class="token punctuation">(</span>HttpUser<span class="token punctuation">)</span><span class="token punctuation">:</span>
  	<span class="token comment"># 请求间隔 5~9s</span>
    wait_time <span class="token operator">=</span> between<span class="token punctuation">(</span><span class="token number">5</span><span class="token punctuation">,</span> <span class="token number">9</span><span class="token punctuation">)</span>

    <span class="token comment"># 通过装饰器将函数定义为用户模拟执行的任务</span>
    <span class="token decorator annotation punctuation">@task</span>
    <span class="token keyword">def</span> <span class="token function">index_page</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        self<span class="token punctuation">.</span>client<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token string">&quot;/hello&quot;</span><span class="token punctuation">)</span>
        self<span class="token punctuation">.</span>client<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token string">&quot;/world&quot;</span><span class="token punctuation">)</span>

    <span class="token comment"># 任务权重，模拟任务执行的比例</span>
    <span class="token comment"># 发送 </span>
    <span class="token decorator annotation punctuation">@task</span><span class="token punctuation">(</span><span class="token number">3</span><span class="token punctuation">)</span>
    <span class="token keyword">def</span> <span class="token function">view_item</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        item_id <span class="token operator">=</span> random<span class="token punctuation">.</span>randint<span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">,</span> <span class="token number">10000</span><span class="token punctuation">)</span>
        <span class="token comment"># 发送 get 请求</span>
        self<span class="token punctuation">.</span>client<span class="token punctuation">.</span>get<span class="token punctuation">(</span><span class="token string-interpolation"><span class="token string">f&quot;/item?id=</span><span class="token interpolation"><span class="token punctuation">{</span>item_id<span class="token punctuation">}</span></span><span class="token string">&quot;</span></span><span class="token punctuation">,</span> name<span class="token operator">=</span><span class="token string">&quot;/item&quot;</span><span class="token punctuation">)</span>

    <span class="token comment"># 模拟的每个用户执行任务前先执行的操作</span>
    <span class="token keyword">def</span> <span class="token function">on_start</span><span class="token punctuation">(</span>self<span class="token punctuation">)</span><span class="token punctuation">:</span>
        <span class="token comment"># 发送 post 请求</span>
        self<span class="token punctuation">.</span>client<span class="token punctuation">.</span>post<span class="token punctuation">(</span><span class="token string">&quot;/login&quot;</span><span class="token punctuation">,</span> <span class="token punctuation">{</span><span class="token string">&quot;username&quot;</span><span class="token punctuation">:</span><span class="token string">&quot;foo&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;password&quot;</span><span class="token punctuation">:</span><span class="token string">&quot;bar&quot;</span><span class="token punctuation">}</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br></div></div><h3 id="_2-用测执行"><a href="#_2-用测执行" class="header-anchor">#</a> 2. 用测执行</h3> <div class="language-python line-numbers-mode"><pre class="language-python"><code>locust <span class="token operator">-</span>f locust_files<span class="token operator">/</span>locustfile<span class="token punctuation">.</span>py
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>注：如果文件名字是locustfile.py，可以省略指定名称，因为执行locust命令时，源码中默认执行的文件名是locustfile.py。</p> <h3 id="_3、打开web-ui-压测管理界面"><a href="#_3、打开web-ui-压测管理界面" class="header-anchor">#</a> 3、打开web UI 压测管理界面</h3> <p>在浏览器中输入 http://127.0.0.1:8089/ ，打开管理界面如下：</p> <p><img src="https://pupper.com.cn/img/20220725162521" alt="20220725162521"></p> <p>注意：如果服务部署在服务器，可以通过IP:8089访问</p> <p>输入模拟的用户数，点击开始start swarming 就可以开始压测啦。</p> <p>参数说明：</p> <ul><li>Number of total users to simulate：模拟的用户数量</li> <li>Hatch rate：每秒中产生的发送的用户数</li> <li>Host：指定向那台服务器发起压测任务</li></ul> <p>注：Hatch rate 是客户端向服务器每秒发送多少请求，但是服务器端不一定能处理过来，如果处理不过来，在服务端服请求就会排队等待处理，通过观察服务器CPU的负载Load AVG，可以查看排队情况。</p> <h3 id="_4、查看压测监控指标"><a href="#_4、查看压测监控指标" class="header-anchor">#</a> 4、查看压测监控指标</h3> <p>开始压测后，在监控详情页，可以实时查看服务器请求的成功失败情况，以及每个请求的响应时间，以及</p> <p>最重要的一个参数：RPS 服务器每秒处理请求的数量</p> <p><strong>Statistics 压测概要</strong></p> <p><img src="https://pupper.com.cn/img/20220725162603" alt="20220725162603"></p> <p><strong>监控参数说明：</strong></p> <ul><li>Type： 请求的类型，例如GET/POST</li> <li>Name：请求的路径</li> <li>request：截止当前为止，客户端已发送请求的数量</li> <li>fails：截止当前为止，客户端已发送请求失败的数量</li> <li>Median：中间值，单位毫秒，一半的服务器响应时间低于该值，而另一半高于该值</li> <li>90%ile：将请求响应时间从小到大排序，第90%请求的单个耗时，意味着90%的请求小于当前值</li> <li>Average：平均值，单位毫秒，所有请求的平均响应时间</li> <li>Min：请求的最小服务器响应时间，单位毫秒</li> <li>Max：请求的最大服务器响应时间，单位毫秒</li> <li>Content Size：单个请求的大小，单位字节</li> <li>Current RPS：每个任务当前的RPS值，即服务器端当前时刻每秒处理当前任务的数量</li> <li>Current Failures/s：每秒请求失败数</li></ul> <p>说明如下：</p> <ul><li>Total Requests per second：每秒请求发送数曲线</li> <li>Response Times：响应时间曲线</li> <li>Number of Users：模拟的用户生成曲线</li></ul> <h2 id="四、-运行模式"><a href="#四、-运行模式" class="header-anchor">#</a> 四、 运行模式</h2> <h3 id="_1-web-ui-模式"><a href="#_1-web-ui-模式" class="header-anchor">#</a> 1. web ui 模式</h3> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>locust -f stress_test.py --web-host <span class="token number">10.1</span>.44.31 --web-port <span class="token number">8090</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ul><li><p>--web-host：指定 web UI IP，默认 localhost</p></li> <li><p>--web-port：指定 web UI 端口，默认 8089</p></li></ul> <h3 id="_2-no-web-模式"><a href="#_2-no-web-模式" class="header-anchor">#</a> 2. no web 模式</h3> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>locust -f stress_test.py --no-web -c <span class="token number">100</span> -r <span class="token number">20</span> -t <span class="token number">120</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ul><li><p>--no-web：指定无 web UI模式</p></li> <li><p>-c：起多少 locust 用户（等同于起多少 tcp 连接）</p></li> <li><p>-r：多少时间内，把上述 -c 设置的虚拟用户全部启动</p></li> <li><p>-t：脚本运行多少时间，单位s</p></li></ul> <p><img src="https://pupper.com.cn/img/20220725162639" alt="20220725162639"></p> <h3 id="_3-分布式进程"><a href="#_3-分布式进程" class="header-anchor">#</a> 3. 分布式进程</h3> <h4 id="单台多进程"><a href="#单台多进程" class="header-anchor">#</a> 单台多进程：</h4> <p>先启一个 master</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>locust -f /home/script/stress_test.py --web-host <span class="token number">10.1</span>.62.223 --master
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>再启 8 个 slave</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>locust -f /home/script/stress_test.py --slave
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>slave 节点启动后，在 locust 监控中能看到</p> <p><img src="https://pupper.com.cn/img/20220725162704" alt="20220725162704"></p> <h4 id="多台多进程"><a href="#多台多进程" class="header-anchor">#</a> 多台多进程：</h4> <p>多台机器搭建 Locust 分布式 和 单台搭建多进程差不多。<strong>只有一个区别，如果 slave 和 master 不在一台机器上， slave 需要指定 --master-host 参数：</strong></p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>locust -f /home/script/stress_test.py --slave --master-host <span class="token number">10.1</span>.62.223
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725162733" alt="20220725162733"></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Pupper0601/NodesCode.git/edit/master/docs/50.软件测试/10.性能测试/02.性能测试 - locust.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=locust" title="标签">#locust</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/07/26, 11:40:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/02e0ea/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">性能测试 - 概述</div></a> <a href="/pages/e67760/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">安全测试 - test</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
