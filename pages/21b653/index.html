FeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">Jenkins技术<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h3 id="_1-jenkins-是什么"><a href="#_1-jenkins-是什么" class="header-anchor">#</a> 1. jenkins 是什么</h3> <p>Jenkins是一个开源的、提供友好操作界面的持续集成(CI)工具，主要用于持续、自动的构建/测试软件项目、监控外部任务的运行（这个比较抽象，暂且写上，不做解释）。</p> <p>Jenkins用Java语言编写，可在Tomcat等流行的servlet容器中运行，也可独立运行。</p> <p>通常与版本管理工具(SCM)、构建工具结合使用。常用的版本控制工具有SVN、GIT，构建工具有Maven、Ant、Gradle。</p> <h3 id="_2-ci-持续集成"><a href="#_2-ci-持续集成" class="header-anchor">#</a> 2. CI --- 持续集成</h3> <p><code>CI</code>(Continuous integration，中文意思是<code>持续集成</code>)是一种软件开发时间。</p> <p>持续集成强调开发人员提交了新代码之后，立刻进行构建、（单元）测试。</p> <p>根据测试结果，我们可以确定新代码和原有代码能否正确地集成在一起。</p> <p><img src="https://pupper.com.cn/img/20220725164838" alt="20220725164838"></p> <h3 id="_3-cd-持续交付"><a href="#_3-cd-持续交付" class="header-anchor">#</a> 3. CD --- 持续交付</h3> <p><code>CD</code>(Continuous Delivery， 中文意思<code>持续交付</code>)是在持续集成的基础上，将集成后的代码部署到更贴近真实运行环境(类生产环境)中。</p> <p>比如，我们完成单元测试后，可以把代码部署到连接数据库的Staging环境中更多的测试。</p> <p>如果代码没有问题，可以继续手动部署到生产环境。</p> <p><img src="https://pupper.com.cn/img/20220725164900" alt="20220725164900"></p> <h2 id="二、-jenkins-环境搭建"><a href="#二、-jenkins-环境搭建" class="header-anchor">#</a> 二、 Jenkins 环境搭建</h2> <h3 id="_1-查看本地镜像"><a href="#_1-查看本地镜像" class="header-anchor">#</a> 1. 查看本地镜像</h3> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> images
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="_2-下载镜像"><a href="#_2-下载镜像" class="header-anchor">#</a> 2. 下载镜像</h3> <h4 id="_1-下载官方最新镜像"><a href="#_1-下载官方最新镜像" class="header-anchor">#</a> 1. 下载官方最新镜像</h4> <ol><li><p>搜索镜像</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> search jenkins
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165017" alt="20220725165017"></p></li> <li><p>下载镜像</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> pull jenkins
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ol> <h4 id="_2-下载指定镜像-阿里云-公共仓库"><a href="#_2-下载指定镜像-阿里云-公共仓库" class="header-anchor">#</a> 2. 下载指定镜像（阿里云 - 公共仓库）</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> pull registry.cn-hangzhou.aliyuncs.com/sqqdcl/jenkins
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165052" alt="20220725165052"></p> <p>查看下载的镜像</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> images
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165137" alt="20220725165137"></p> <h3 id="_3-创建容器"><a href="#_3-创建容器" class="header-anchor">#</a> 3. 创建容器</h3> <h4 id="_1-创建-宿主机-挂载目录"><a href="#_1-创建-宿主机-挂载目录" class="header-anchor">#</a> 1. 创建 宿主机 挂载目录</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">mkdir</span> -p /var/jenkins_home
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h4 id="_2-设置-挂载目录-权限"><a href="#_2-设置-挂载目录-权限" class="header-anchor">#</a> 2. 设置 挂载目录 权限</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">chmod</span> <span class="token number">777</span> /var/jenkins_home
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h4 id="_3-创建与启动守护式容器-注意容器中的端口使用-8080"><a href="#_3-创建与启动守护式容器-注意容器中的端口使用-8080" class="header-anchor">#</a> 3. 创建与启动守护式容器 --- 注意容器中的端口使用 8080</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> run -id --name<span class="token operator">=</span>sqjenkins -p <span class="token number">8080</span>:8080 -v /var/jenkins_home:/var/jenkins_home registry.cnhangzhou.aliyuncs.com/sqqdcl/jenkins
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h4 id="_4-查看容器"><a href="#_4-查看容器" class="header-anchor">#</a> 4. 查看容器</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> <span class="token function">ps</span> -a
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="三、jenkins-设置"><a href="#三、jenkins-设置" class="header-anchor">#</a> 三、jenkins 设置</h2> <h3 id="_1-访问-jenkins"><a href="#_1-访问-jenkins" class="header-anchor">#</a> 1. 访问 jenkins</h3> <h4 id="_1-获取-宿主机-ip"><a href="#_1-获取-宿主机-ip" class="header-anchor">#</a> 1. 获取 宿主机 IP</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>ipconfig
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h4 id="_2-访问-jenkins"><a href="#_2-访问-jenkins" class="header-anchor">#</a> 2. 访问 jenkins</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>http://宿主机ip：8080
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165453" alt="20220725165453"></p> <h4 id="_3-获取-管理员密码"><a href="#_3-获取-管理员密码" class="header-anchor">#</a> 3. 获取  管理员密码</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> logs jenkins
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165551" alt="20220725165551"></p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">cat</span> /var/jenkins_node/secrets/initialAdminPassword
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165617" alt="20220725165617"></p> <h3 id="_2-安装插件"><a href="#_2-安装插件" class="header-anchor">#</a> 2. 安装插件</h3> <h4 id="_1-首次进入"><a href="#_1-首次进入" class="header-anchor">#</a> 1. 首次进入</h4> <ol><li>选择 安装推荐的插件</li></ol> <p><img src="https://pupper.com.cn/img/20220725165654" alt="20220725165654"></p> <ol start="2"><li><p>设置 第一个管理员</p> <p>用户名密码：admin</p> <p>电子邮件：pupper.cheng@gmail.com</p> <p><img src="https://pupper.com.cn/img/20220725165716" alt="20220725165716"></p></li></ol> <h4 id="_2-安装插件-gitlab-gitlab-hook-allure"><a href="#_2-安装插件-gitlab-gitlab-hook-allure" class="header-anchor">#</a> 2. 安装插件 --- gitlab，gitlab hook, allure</h4> <p><img src="https://pupper.com.cn/img/20220725165741" alt="20220725165741"></p> <h5 id="_1-修改下载源"><a href="#_1-修改下载源" class="header-anchor">#</a> 1. 修改下载源</h5> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>http://mirror.xmission.com/jenkins/updates/update-center.json
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725165804" alt="20220725165804"></p> <h5 id="_2-搜索-gitlab-allure-直接安装"><a href="#_2-搜索-gitlab-allure-直接安装" class="header-anchor">#</a> 2. 搜索 gitlab ，allure 直接安装</h5> <p><img src="https://pupper.com.cn/img/20220725165832" alt="20220725165832"></p> <p><img src="https://pupper.com.cn/img/20220725165855" alt="20220725165855"></p> <h4 id="_3-重启-jenkins"><a href="#_3-重启-jenkins" class="header-anchor">#</a> 3. 重启 jenkins</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> restart 容器id
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="_3-jenkins-全局设置"><a href="#_3-jenkins-全局设置" class="header-anchor">#</a> 3. jenkins 全局设置</h3> <p><img src="https://pupper.com.cn/img/20220725165917" alt="20220725165917"></p> <h4 id="_1-设置-jdk"><a href="#_1-设置-jdk" class="header-anchor">#</a> 1. 设置 JDK</h4> <p>别名：<code>JAVA_HOME</code></p> <p>JAVA_HOME：<code>/usr/local/openjdk-8</code></p> <p>不要勾选 <code>自动安装</code></p> <p><img src="https://pupper.com.cn/img/20220725165950" alt="20220725165950"></p> <h4 id="_2-git-设置"><a href="#_2-git-设置" class="header-anchor">#</a> 2. git 设置</h4> <p>Name： <code>git</code></p> <p>Path to Git executable ： <code>/usr/bin/git</code></p> <p><img src="https://pupper.com.cn/img/20220725170020" alt="20220725170020"></p> <h4 id="_3-allure-设置"><a href="#_3-allure-设置" class="header-anchor">#</a> 3. allure 设置</h4> <p>别名： <code>allure</code></p> <p>安装目录： <code>/opt/allure-2.13.5</code></p> <p><img src="https://pupper.com.cn/img/20220725170225" alt="20220725170225"></p> <h3 id="_4-jenkins-邮件功能-设置"><a href="#_4-jenkins-邮件功能-设置" class="header-anchor">#</a> 4. jenkins 邮件功能 设置</h3> <p><img src="https://pupper.com.cn/img/20220725170251" alt="20220725170251"></p> <h4 id="_1-发送者-邮箱-设置"><a href="#_1-发送者-邮箱-设置" class="header-anchor">#</a> 1. 发送者 邮箱 设置</h4> <p>网易邮箱：<code>pupper_cheng@163.com</code></p> <p>授权码：<code>DYTDGFPLGXUBYZKA</code></p> <p><img src="https://pupper.com.cn/img/20220725170315" alt="20220725170315"></p> <p><img src="https://pupper.com.cn/img/20220725170335" alt="20220725170335"></p> <h4 id="_2-接受者邮箱设置"><a href="#_2-接受者邮箱设置" class="header-anchor">#</a> 2. 接受者邮箱设置</h4> <p><img src="https://pupper.com.cn/img/20220725170358" alt="20220725170358"></p> <h2 id="四、-自动化环境验证"><a href="#四、-自动化环境验证" class="header-anchor">#</a> 四、 自动化环境验证</h2> <h3 id="_1-python-环境验证"><a href="#_1-python-环境验证" class="header-anchor">#</a> 1. python 环境验证</h3> <h4 id="_1-进入容器"><a href="#_1-进入容器" class="header-anchor">#</a> 1. 进入容器：</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">docker</span> <span class="token builtin class-name">exec</span> -it jenkins /bin/bash
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h4 id="_2-验证-python"><a href="#_2-验证-python" class="header-anchor">#</a> 2. 验证 python：</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>python3
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://pupper.com.cn/img/20220725175725" alt="20220725175725"></p> <h4 id="_3-验证依赖库"><a href="#_3-验证依赖库" class="header-anchor">#</a> 3. 验证依赖库</h4> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code>pip3 list
