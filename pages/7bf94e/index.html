义符 <code>\n</code>是换行符的意思，<code>\t</code>是制表符的意思</p> <p>如果想让换行符或者其他有特殊含义的符号不生效，则可以在<code>/</code>之前再加上一个<code>\</code>，或者在字符串最前边加上<code>r</code></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'c:\\totel.txt'</span><span class="token punctuation">)</span>

<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">r'c:\totel.txt'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><div class="custom-block warning"><p class="custom-block-title">注意</p> <p>在python中，写路径时可以使用<code>/</code>来代替<code>\</code></p></div> <h3 id="三引号的作用"><a href="#三引号的作用" class="header-anchor">#</a> 三引号的作用</h3> <ol><li><p>三引号可以保留字符串的格式，包括换行符和空格等</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">print</span><span class="token punctuation">(</span><span class="token triple-quoted-string string">'''曾经沧海难为水，
除却巫山不是云。
'''</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li> <li><p>三引号不予关键字连接时，则表示为[^注释]，一般用在函数及方法里。</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token triple-quoted-string string">'''
曾经沧海难为水，
除却巫山不是云。
'''</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></li></ol> <h3 id="字符串拼接"><a href="#字符串拼接" class="header-anchor">#</a> 字符串拼接</h3> <p>字符串的拼接为直接拼接，不进行任何运算。</p> <p><code>print('1'+'5')</code>---&gt; '15'</p> <p>字符串拼接时有<code>*</code>加int数字，则表示将字符串重复拼接int遍。</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">&quot;a&quot;</span> <span class="token operator">*</span><span class="token number">3</span><span class="token punctuation">)</span>

aaa
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h3 id="下标"><a href="#下标" class="header-anchor">#</a> 下标</h3> <p>字符串的下标由左往右为<code>0</code>开始，右右往左为从<code>-1</code>开始。
<img src="https://pupper.com.cn/img/20220725152546.png" alt=""></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>a <span class="token operator">=</span> <span class="token string">'刘总你好啊'</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">]</span><span class="token punctuation">)</span>		<span class="token comment"># 你</span>
<span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">[</span><span class="token operator">-</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span>	<span class="token comment"># 啊</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h3 id="切片"><a href="#切片" class="header-anchor">#</a> 切片</h3> <p>字符串通过下标，得到字符串中特定的内容就叫切片</p> <p>切片的完整写法,是<code>[起始值:终止值:步长]</code>,步长是每几位取一次值,当步长省略时,默认为1</p> <div class="custom-block tip"><p class="custom-block-title">提示</p> <p>1.切片的区间为  <strong>左闭右开</strong></p> <p>2.字符串切片前面的索引是切片开始的元素的 索引，后面的索引是切片结束的元素的 <strong>索引 + 1</strong></p></div> <p><img src="https://pupper.com.cn/img/20220725152659.png" alt=""></p> <p>通过切片，切出 <strong>你好</strong> 的字符串。</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">:</span><span class="token number">4</span><span class="token punctuation">]</span><span class="token punctuation">)</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">[</span><span class="token operator">-</span><span class="token number">3</span><span class="token punctuation">:</span><span class="token operator">-</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>通过切片，切出 <strong>你好啊</strong> 的字符串</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code><span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">:</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>如果 后面的索引 空着不写，<strong>表示到整个字符串的结束</strong>，如果 前面的索引 不写，可以表示 <strong>从字符串的开头切片</strong>。</p> <p>使用切片可以将字符串 <strong>倒序</strong> 输出</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>a <span class="token operator">=</span> <span class="token string">'ABCDEFGHIJKLMN'</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">[</span><span class="token punctuation">:</span><span class="token punctuation">:</span><span class="token operator">-</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span>		<span class="token comment"># NMLKJIHGFEDCBA</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h3 id="获取字符串长度"><a href="#获取字符串长度" class="header-anchor">#</a> 获取字符串长度</h3> <p>内置函数 <code>len()</code> 可以用来获取字符串的长度，也是获取字符串中字符的个数.</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>a <span class="token operator">=</span> <span class="token string">'abcdefghijklmn'</span>

<span class="token keyword">print</span><span class="token punctuation">(</span><span class="token builtin">len</span><span class="token punctuation">(</span>a<span class="token punctuation">)</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h3 id="获取字符下标"><a href="#获取字符下标" class="header-anchor">#</a> 获取字符下标</h3> <p>内置函数<code>intdex()</code> 可以根据字符找到在字符串中的下标，默认返回第一次出现时的下标。</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>a <span class="token operator">=</span> <span class="token string">'dsaldfjlsakdfjaldsjfx'</span>

<span class="token keyword">print</span><span class="token punctuation">(</span>a<span class="token punctuation">.</span>index<span class="token punctuation">(</span><span class="token string">'d'</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
