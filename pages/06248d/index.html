VVM 模型</h4> <ul><li><code>VUE</code> 用过 <code>vue</code> 对象将数据 和 view 完全分离</li> <li>对数据进行操作不再需要引用相应的 <code>DOM对象</code>，数据和view 是分离的，他们通过 vue 对象实现相互的绑定。</li></ul> <p><img src="https://pupper.com.cn/img/20220725185349.png" alt=""></p> <h2 id="一、-vue-库的引入"><a href="#一、-vue-库的引入" class="header-anchor">#</a> 一、 Vue 库的引入</h2> <h3 id="_1-本地引入"><a href="#_1-本地引入" class="header-anchor">#</a> 1. 本地引入</h3> <p>从 Vue.js 的官网下载 vue.min.js , 并用 &lt; script&gt; 标签引入</p> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span> <span class="token attr-name">src</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>js/vue.min.js<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span><span class="token script"></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>script</span><span class="token punctuation">&gt;</span></span>

	<span class="token comment">// 选项</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>通过给 Vue 对象 添加 <code>不同的选项</code>， 来控制网页的 <code>行为</code></p> <h3 id="_2-template-属性"><a href="#_2-template-属性" class="header-anchor">#</a> 2. template 属性</h3> <p><code>template</code> 属性 ： 用于把 <strong>指定的元素绑定到 DOM 上</strong></p> <p><strong>template 属性 绑定元素的三种方式：</strong></p> <ul><li>使用模板字符串拼接（不推荐）</li> <li>使用 script 标签形式 （HTML5 之前使用）</li> <li>使用 HTML 的 template 标签 （官方推荐）</li></ul> <h3 id="_3-插值表达式"><a href="#_3-插值表达式" class="header-anchor">#</a> 3. 插值表达式</h3> <p>语法 ： <code>NaN</code></p> <p><img src="https://pupper.com.cn/img/20220725185419.png" alt=""></p> <h3 id="_4-vue-指令"><a href="#_4-vue-指令" class="header-anchor">#</a> 4. VUE 指令</h3> <p>vue指令 是带有 <code>v-</code>前缀 的特殊属性</p> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">v-html</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>message<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span> <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>h1</span> <span class="token attr-name">v-show</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>OK<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span> hello world <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>h1</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>li</span> <span class="token attr-name">v-for</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>item in items<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>{{item}}<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>li</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>a</span> <span class="token attr-name"><span class="token namespace">v-bind:</span>href</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>url<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>官网<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>a</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>p</span> <span class="token attr-name">v-if</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>seen<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>看到了<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>p</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h4 id="v-html-指令"><a href="#v-html-指令" class="header-anchor">#</a> v-html 指令</h4> <p>用于插入 <code>原生的html内容</code> ， 即：内容中如果包含 html标签对，将不会显示出来</p> <p>语法 ： <code>&lt;div v-html = &quot;message&quot;&gt; &lt;/div&gt;</code></p> <p>其中 ： message 为 绑定的变量</p> <h4 id="v-text-指令"><a href="#v-text-指令" class="header-anchor">#</a> v-text 指令</h4> <p>用于 填充纯文本 ， 即 ： 即使文本中有 HTML 标签，任然显示它的 <code>文本</code>， 另外他<code>不存在闪烁问题</code></p> <p>语法 ： <code>&lt;div v-text = &quot;message&quot;&gt;&lt;/div&gt;</code></p> <p>其中 ： message 为 绑定的变量</p> <h4 id="v-once-指令"><a href="#v-once-指令" class="header-anchor">#</a> v-once 指令</h4> <p>用于只 <code>渲染元素或组件一次</code>， 即数据修改后，元素或组件的内容不变</p> <p>语法 ： <code>&lt;div v-once&gt;&lt;/div&gt;</code></p> <p>其中 ： message 为 插值表达式</p> <h4 id="v-cloak-指令"><a href="#v-cloak-指令" class="header-anchor">#</a> v-cloak 指令</h4> <p>用于解决插值表达式的 <code>闪烁现象</code></p> <p>因网络延时等原因，插值表达式可能会出现闪烁现象，即页面上 <code>显示</code></p> <p>语法 ： <code>&lt;div v-cloak&gt;&lt;/div&gt;</code></p> <p>其中 ： message 为 插值表达式</p> <h4 id="v-model-指令"><a href="#v-model-指令" class="header-anchor">#</a> v-model 指令</h4> <p>用于在 <code>表单控件或组件上</code> 创建数据的双向绑定，默认情况下每次的数据修改时立即绑定</p> <p>语法 ： <code>&lt;input tpye = &quot;text&quot; v-model = &quot;username&quot;&gt;</code></p> <p>其中 ： username 为 绑定的变量</p> <p><strong>v-model 修饰符：</strong></p> <ul><li><code>.lazy</code> ： 只有在回车或失去焦点后，才进行数据绑定</li> <li><code>.number</code> ： 当用户输入数字类型时，自动把用户输入转换为数字类型</li> <li><code>.trim</code> ： 去除字符串左右两边的空格</li></ul> <h4 id="v-bind-指令"><a href="#v-bind-指令" class="header-anchor">#</a> v-bind 指令</h4> <p>用于绑定数据到 <code>HTML标签的属性</code> 上</p> <p>语法 ： <code>&lt;a v-bind:href = &quot;url&quot;&gt;官网&lt;/a&gt;</code></p> <p><strong>简写</strong> ：<code>&lt;a :href = &quot;url&quot;&gt;官网&lt;/a&gt;</code></p> <p>其中 ： url 为绑定的变量</p> <h4 id="v-on-指令"><a href="#v-on-指令" class="header-anchor">#</a> v-on 指令</h4> <p>用于 <code>监听DOM事件</code> ， 如：执行 js 代码、执行事件处理方法、执行内联 js 方法</p> <p>语法 ： <code>&lt;a v-on:click = &quot;doSome&quot;&gt;确定&lt;/a&gt;</code></p> <p><strong>简写</strong> ： <code>&lt;a @click = &quot;doSomething&quot;&gt;确定&lt;/a&gt;</code></p> <p>其中 ： doSomething 为事件处理方法</p> <h4 id="v-if-v-else-if-v-else-指令"><a href="#v-if-v-else-if-v-else-指令" class="header-anchor">#</a> v-if / v-else-if / v-else 指令</h4> <p>用于条件判断</p> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">v-if</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>type === <span class="token punctuation">'</span>A<span class="token punctuation">'</span><span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>A<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">v-else-if</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>type === <span class="token punctuation">'</span>B<span class="token punctuation">'</span><span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>B<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">v-else-if</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>type === <span class="token punctuation">'</span>C<span class="token punctuation">'</span><span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>C<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">v-else</span><span class="token punctuation">&gt;</span></span>Not A/B/C<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h4 id="v-for-指令"><a href="#v-for-指令" class="header-anchor">#</a> v-for 指令</h4> <p>用于把 数组和对象 渲染为 列表</p> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>li</span> <span class="token attr-name">v-for</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>item in items<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>{{item}}<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>li</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>li</span> <span class="token attr-name">v-for</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>(item, index) in items<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>{{index}}-{{item}}<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>li</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><h4 id="v-show-指令"><a href="#v-show-指令" class="header-anchor">#</a> v-show 指令</h4> <p>用于 <code>根据条件展示元素</code> 的指令</p> <p><code>v-shwo</code> 控制的是元素的 <code>display</code> ，他不支持 <code>template 元素</code></p> <p>语法 ： <code>&lt;div v-show = &quot;ok&quot;&gt;Hello&lt;/div&gt;</code></p> <p>其中 ： OK 为绑定的布尔变量</p> <h2 id="三、-vue-进阶"><a href="#三、-vue-进阶" class="header-anchor">#</a> 三、 VUE 进阶</h2> <h3 id="_1-computed-计算属性"><a href="#_1-computed-计算属性" class="header-anchor">#</a> 1. computed 计算属性</h3> <p>计算属性的作用是方便处理 <code>复杂逻辑</code></p> <h3 id="_2-watch-监听属性"><a href="#_2-watch-监听属性" class="header-anchor">#</a> 2. watch 监听属性</h3> <p>监听属性的作用是 <code>当被监听的属性发生变化时</code> ， 监听函数就会被执行</p> <h3 id="_3-component-全局组件"><a href="#_3-component-全局组件" class="header-anchor">#</a> 3. component 全局组件</h3> <p>主要用来扩展 HTML 元素， 封装可重用的代码</p> <p><code>全局组件</code> ： 只要定义，全局可以使用，组件名建议为 字母小写，中间用横线间隔</p> <p><code>局部组件</code> ： 定义后需要注册才能使用，组件名建议为首字母大写，驼峰命名</p> <h3 id="_4-vue-生命周期函数"><a href="#_4-vue-生命周期函数" class="header-anchor">#</a> 4. vue 生命周期函数</h3> <p><code>beforeCreate()</code></p> <p><code>created()</code></p> <p><code>beforeMount()</code></p> <p><code>mounted()</code></p> <p><code>beforeUpdate()</code></p> <p><code>updated()</code></p> <p><code>beforeUnmount()</code></p> <p><code>unmounted()</code></p> <h3 id="_5-promise-对象"><a href="#_5-promise-对象" class="header-anchor">#</a> 5. promise 对象</h3> <p><code>promise</code> ： 表示 承诺将来会执行，不要用于 异步操作（先发送一个异步请求，再在将来的某个时候，调用 成功处理函数或者失败处理函数）</p> <p><img src="https://pupper.com.cn/img/20220725185444.png" alt=""></p> <h2 id="四、-axios"><a href="#四、-axios" class="header-anchor">#</a> 四、 axios</h2> <p><code>axios</code> ： 一个基于 <code>Promise</code> 的 HTTP请求客户端</p> <p>由于 vue本身不支持发送 <code>ajax 请求</code>，所以需要使用 vue-resource、 axios 等插件。</p> <p><code>axios</code> 可以使用 <code>.then()</code> 方法</p> <h3 id="_1-axios-插件安装"><a href="#_1-axios-插件安装" class="header-anchor">#</a> 1. axios 插件安装</h3> <ul><li><p>使用 npm 安装</p> <div class="language-js line-numbers-mode"><pre class="language-js"><code>npm install axios
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>使用 CDN</p> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span> <span class="token attr-name">src</span> <span class="token attr-value"><span class="token punctuation attr-equals">=</span> <span class="token punctuation">&quot;</span>https://unpkg.com/axios/dist/axios.min.js<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span><span class="token script"></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>script</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ul> <h3 id="_2-get-请求"><a href="#_2-get-请求" class="header-anchor">#</a> 2. get 请求</h3> <p><img src="https://pupper.com.cn/img/20220725185509.png" alt=""></p> <h3 id="_3-post-请求"><a href="#_3-post-请求" class="header-anchor">#</a> 3.  post 请求</h3> <p><img src="https://pupper.com.cn/img/20220725185527.png" alt=""></p> <h3 id="_4-axios-的-api"><a href="#_4-axios-的-api" class="header-anchor">#</a> 4. axios 的 API</h3> <p><img src="https://pupper.com.cn/img/20220725185545.png" alt=""></p> <h2 id="五、-vue-cli"><a href="#五、-vue-cli" class="header-anchor">#</a> 五、 vue-cli</h2> <p><code>vue-cli</code> ： 是 <code>vue.js</code> 的脚手架， 用于自动生成 <code>vue.js+webpack</code> 的项目模板</p> <p>使用 <code>vue init webpack 项目名</code> 命令，可以在当前文件夹生成一个项目模板</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Pupper0601/NodesCode.git/edit/master/docs/50.软件测试/40.测试开发/03.web前端开发/12.VUE基础.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E5%89%8D%E7%AB%AF%E5%BC%80%E5%8F%91" title="标签">#前端开发</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/07/26, 11:40:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/4812e1/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">JQuery技巧</div></a> <a href="/pa
